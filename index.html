<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.unregister()));}
const STORAGE_KEY='kartavya-main-data';
const TOPUP=5000,DEFAULT_WALLET=5000,DEFAULT_REWARD=50,DEFAULT_PENALTY=200,DEFAULT_DURATION=30;
const STAR_HOUR_PENALTY=30,STAR_MINUTES_PER_HOUR_MS=30*60*1000,STAR_START_HOUR=8,STAR_END_HOUR=22;
const MACRODROID_WEBHOOK_URL='https://trigger.macrodroid.com/9d8de64f-05db-49f9-9470-18e7f06404e1/kartavya_timer';
const state={wallet:DEFAULT_WALLET,taskName:'',reward:String(DEFAULT_REWARD),penalty:String(DEFAULT_PENALTY),durationMinutes:DEFAULT_DURATION,durationText:'30 min',storeDurationText:'30 min',tasks:[],taskStore:[],routineTasks:[],history:[],activeTaskId:null,soundEnabled:true,vibrationEnabled:true,warned10MinTaskId:null,warned5MinTaskId:null,showStoreList:false,editStoreTaskId:null,editStoreTaskName:'',editStoreTaskDurationText:'30 min',starHourWorkMs:{},starHourPenaltyApplied:{},lastWorkSliceAt:null};
const dragState={list:null,id:null,overId:null};
function sanitizeNumber(value,fallback){const n=Number(value);return Number.isFinite(n)&&n>=0?n:fallback}
function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function rupee(n){return '₹'+Number(n||0).toLocaleString('en-IN')}
function todayKey(dateObj=new Date()){return dateObj.getFullYear()+'-'+String(dateObj.getMonth()+1).padStart(2,'0')+'-'+String(dateObj.getDate()).padStart(2,'0')}
function hourKey(dateObj){return todayKey(dateObj)+'-'+String(dateObj.getHours()).padStart(2,'0')}
function suffixDay(d){if(d>3&&d<21)return d+'th';switch(d%10){case 1:return d+'st';case 2:return d+'nd';case 3:return d+'rd';default:return d+'th'}}
function createdDateShort(iso){if(!iso)return '';const d=new Date(iso);if(isNaN(d))return '';return suffixDay(d.getDate())+' '+d.toLocaleString('en-IN',{month:'long'})}
function formatDuration(mins){mins=Math.max(0,Math.round(Number(mins)||0));if(mins<60)return mins+' min';const h=Math.floor(mins/60),m=mins%60;return m===0?h+' hr':h+' hr '+m+' min'}
function formatMs(ms){let mins=Math.floor(Math.max(0,Number(ms)||0)/60000);if(mins<60)return mins+' min';const h=Math.floor(mins/60),m=mins%60;return m===0?h+' hr':h+' hr '+m+' min'}
function formatTimeLeftDisplay(seconds){seconds=Math.max(0,Math.floor(Number(seconds)||0));const mins=Math.floor(seconds/60);if(mins<60)return 'Time left '+mins+' min';const h=Math.floor(mins/60),m=mins%60;return 'Time left '+h+' hr '+m+' min'}
function parseDurationToMinutes(text){if(typeof text!=='string')return null;const raw=text.trim().toLowerCase();if(!raw)return null;let total=0,matched=false;const hr=raw.match(/(\d+(?:\.\d+)?)\s*(hr|hrs|hour|hours|h)\b/),mn=raw.match(/(\d+)\s*(min|mins|minute|minutes|m)\b/);if(hr){total+=Math.round(parseFloat(hr[1])*60);matched=true}if(mn){total+=parseInt(mn[1],10);matched=true}if(matched&&total>0)return total;if(/^\d+$/.test(raw))return parseInt(raw,10);return null}
function normalizeDurationInput(text){const mins=parseDurationToMinutes(text);if(mins===null||mins<=0)return null;return{minutes:mins,text:formatDuration(mins)}}
function isStarredTaskName(name){return /^\s*\*/.test(String(name||''))}
function activeTask(){if(!state.activeTaskId)return null;return state.tasks.find(x=>x.id===state.activeTaskId)||null}
function getStoreItem(id){return state.taskStore.find(x=>x.id===id)||null}
function cleanTaskName(name){let s=String(name||'').trim().toLowerCase();while(s.includes('  ')){s=s.replaceAll('  ',' ')}return s}
function storedWorkedMs(item){return Math.max(0,Number(item&&item.totalWorkedMs)||0)}
function workedMsFromHistoryEntry(h){
  if(!h || h.isStarHourPenalty || h.isRoutineDayPenalty) return 0;
  if(Number.isFinite(Number(h.workedMs))) return Math.max(0,Number(h.workedMs));
  if(h.activatedAt && h.completedAt){
    const used=new Date(h.completedAt).getTime()-new Date(h.activatedAt).getTime();
    if(Number.isFinite(used) && used>0) return used;
  }
  return 0;
}
function historyWorkedMsForStoreItem(item){
  if(!item) return 0;
  const key=cleanTaskName(item.taskName);
  return state.history.reduce((sum,h)=>{
    if(!h || h.isStarHourPenalty || h.isRoutineDayPenalty) return sum;
    const sameSource=(h.sourceType==='store' && h.sourceId===item.id);
    const sameName=key && cleanTaskName(h.taskName)===key;
    if(!sameSource && !sameName) return sum;
    return sum + workedMsFromHistoryEntry(h);
  },0);
}
function historyWorkedMsForTaskName(taskName){
  const key=cleanTaskName(taskName);
  if(!key) return 0;
  return state.history.reduce((sum,h)=>{
    if(!h || h.isStarHourPenalty || h.isRoutineDayPenalty) return sum;
    if(cleanTaskName(h.taskName)!==key) return sum;
    return sum + workedMsFromHistoryEntry(h);
  },0);
}
function storeItemCumulativeWorkedMs(item){
  return Math.max(storedWorkedMs(item),historyWorkedMsForStoreItem(item));
}
function taskBaseWorkedMs(task){
  if(!task) return 0;
  const item=(task.sourceType==='store'&&task.sourceId)?getStoreItem(task.sourceId):null;
  const byStore=item?storeItemCumulativeWorkedMs(item):0;
  const byHistory=historyWorkedMsForTaskName(task.taskName);
  return Math.max(storedWorkedMs(task),byStore,byHistory);
}
function currentActiveWorkedMs(task){if(!task||!task.activatedAt)return 0;if(task.isPaused)return Math.max(0,Number(task.pausedUsedMs)||0);return Math.max(0,Date.now()-new Date(task.activatedAt).getTime())}
function taskCumulativeWorkedMs(task){return taskBaseWorkedMs(task)+currentActiveWorkedMs(task)}
function normalizeQueueOrdering(){const starred=[],normal=[];state.tasks.forEach(i=>(isStarredTaskName(i.taskName)?starred:normal).push(i));state.tasks=[...starred,...normal]}
function normalizeTaskStoreOrdering(){const starred=[],open=[],done=[];state.taskStore.forEach(i=>{if(isStarredTaskName(i.taskName))starred.push(i);else if(i.completed)done.push(i);else open.push(i)});state.taskStore=[...starred,...open,...done]}
function insertIntoPriorityList(listKey,item){state[listKey].push(item);if(listKey==='tasks')normalizeQueueOrdering();if(listKey==='taskStore')normalizeTaskStoreOrdering()}
function markPastStarHoursAsHandled(){const now=new Date();const dates=[new Date(now),new Date(now.getTime()-86400000)];dates.forEach(day=>{const y=day.getFullYear(),m=day.getMonth(),dt=day.getDate();for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){const slotEnd=new Date(y,m,dt,h+1,0,0,0);const key=todayKey(new Date(y,m,dt))+'-'+String(h).padStart(2,'0');if(Date.now()>=slotEnd.getTime())state.starHourPenaltyApplied[key]=true;}})}

function render(){const app=document.getElementById('app'),a=activeTask(),s=stats(),urgency=urgencyClass(),overdue=!!(a&&!a.isPaused&&a.deadline&&(new Date(a.deadline)-new Date())<=0);const currentTaskHtmlText=currentTaskHtml(a),endText=a?(a.isPaused?'Paused':(overdue?'Deadline crossed':'Ends: '+new Date(a.deadline).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}))):'',successButtonText='✔️ Success (Get '+rupee(Number(state.reward||DEFAULT_REWARD))+')',failButtonText='❌ Failed (Pay '+rupee(Number(state.penalty||DEFAULT_PENALTY))+')',timeLeftText=a?(a.isPaused?'Paused • Tap to Resume':(overdue?'Overdue • Tap to Pause':currentRemainingText(a))):'Time left 0 min';const focus=focusDotsHtml();const queueHtml=state.tasks.length?state.tasks.map((item,idx)=>{const isActive=item.id===state.activeTaskId,isStar=isStarredTaskName(item.taskName),label=isActive?'▶ ':(isStar?'':(idx+1)+'. '),date=createdDateShort(item.createdAt);return '<div class="draggable-item'+(isActive?' active':'')+'" data-list="queue" data-id="'+item.id+'"><div class="queue-row"><div><div class="item-name '+(isStar?'star-item-name':'')+'">'+label+escapeHtml(item.taskName)+(date?' <span class="item-date">('+escapeHtml(date)+')</span>':'')+'</div><div class="item-meta">'+formatDuration(item.durationMinutes||0)+' • Total Hrs '+formatMs(taskCumulativeWorkedMs(item))+'</div></div><button class="mini mini-copy" data-copy-queue="'+item.id+'">Copy</button><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="queue" data-id="'+item.id+'">⋮⋮</button><button class="btn-delete mini" data-remove="'+item.id+'">Delete</button></div></div>'}).join(''):'<div class="empty-state">No queued task yet.</div>';
const storeHtml=state.taskStore.length?state.taskStore.map((item,idx)=>{const dotClass=item.completed?'green':'red',isStar=isStarredTaskName(item.taskName),label=isStar?'':(idx+1)+'. ',date=createdDateShort(item.createdAt);if(state.editStoreTaskId===item.id){return '<div class="draggable-item" data-list="store" data-id="'+item.id+'"><div class="paired-grid" style="margin-top:0"><div class="paired-box"><label>Task Name</label><input id="editStoreTaskName_'+item.id+'" value="'+escapeHtml(state.editStoreTaskName||item.taskName)+'"></div><div class="paired-box"><label>Duration</label><input id="editStoreTaskDuration_'+item.id+'" class="duration-input" value="'+escapeHtml(state.editStoreTaskDurationText||formatDuration(item.durationMinutes))+'"></div></div><div class="row" style="margin-top:8px"><button class="btn-success mini" style="flex:1" data-save-store-edit="'+item.id+'">Save</button><button class="btn-outline mini" data-cancel-store-edit="1">Cancel</button></div></div>'}return '<div class="draggable-item" data-list="store" data-id="'+item.id+'"><div class="store-row"><div><div class="item-name '+(isStar?'star-item-name':'')+'" data-edit-store="'+item.id+'" style="cursor:pointer"><span class="status-dot '+dotClass+'"></span>'+label+escapeHtml(item.taskName)+(date?' <span class="item-date">('+escapeHtml(date)+')</span>':'')+'</div><div class="item-meta">'+formatDuration(item.durationMinutes)+' • Total Hrs '+formatMs(storeItemCumulativeWorkedMs(item))+'</div></div><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="store" data-id="'+item.id+'">⋮⋮</button><button class="btn-queue mini" data-send-queue="'+item.id+'">Queue</button><button class="btn-delete mini" data-store-delete="'+item.id+'">Delete</button></div></div>'}).join(''):'<div class="empty-state">No task stored yet.</div>';
app.innerHTML=`<div class="card top-card ${a&&a.isPaused?'paused':(overdue?'danger':urgency)}" id="topCard"><div class="space"><div class="row" style="min-width:0;flex:1"><div class="title">Kartavya</div><div class="logo-wrap"><div class="logo">🎯</div></div><div id="successPercent" class="small pill green-pill">${successPercent()}% Success</div></div><div style="min-width:0;flex:1;text-align:right"><div class="small">Current Task</div><div class="sub" id="currentTaskText" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentTaskHtmlText}</div><div class="star-rule">★Task: 30 min/hr or lose ₹30</div></div></div><div class="bar-wrap ${a?'tappable':''} ${a&&a.isPaused?'paused':''}" id="taskBarTap"><div class="bar-done" id="doneBar" style="width:${a?(overdue?100:currentProgressPercent(a)):0}%"></div><div class="bar-left" id="leftBar" style="width:${a?(overdue?0:100-currentProgressPercent(a)):100}%"></div><div class="bar-label" id="timeLeftInline">${timeLeftText}</div></div><div class="task-meta"><div>Duration: <span id="activeDurationText">${a?formatDuration(a.durationMinutes||0):'--'}</span></div><div>Total Hrs: <span id="activeTotalHrsText">${a?formatMs(taskCumulativeWorkedMs(a)):'--'}</span></div><div id="deadlineStatusText">${endText}</div></div><div class="action-buttons"><button class="btn-success" id="successBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${successButtonText}</button><button class="btn-danger" id="failBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${failButtonText}</button></div></div>
<div class="card"><div class="section-head"><span class="section-dot"></span><div class="sub">Your Performance</div></div><div class="performance-wrap"><div class="performance-grid"><div class="perf-box perf-reward"><h4>Total Reward</h4><div class="val" style="color:#d8ffe6">${rupee(s.reward)}</div></div><div class="perf-box perf-penalty"><h4>Total Penalty</h4><div class="val" style="color:#ffd0d0">${rupee(s.penalty)}</div></div><div class="perf-box perf-wallet"><h4>Wallet Balance</h4><div class="val">${rupee(state.wallet)}</div><button class="btn-primary tiny-btn" id="topupBtn">+${rupee(TOPUP)}</button></div></div><div id="focusDotsWrap">${focus.html}</div></div></div>
<div class="card queued-panel"><div class="section-head"><span class="section-dot"></span><div class="list-title">Queued Task</div></div>${queueHtml}</div>
<div class="card store-panel"><div class="section-head"><span class="section-dot"></span><div class="list-title">Task Store</div></div><div class="paired-grid"><div class="paired-box"><label>Task</label><input id="storeTaskInput" value="" placeholder="Enter Task"></div><div class="paired-box"><label>Duration</label><input id="storeDurationInput" class="duration-input" value="${escapeHtml(state.storeDurationText)}" placeholder="e.g. 30 min"></div></div><div class="row" style="margin-top:8px"><button class="btn-gold" id="storeAddBtn" style="flex:1">Add Task</button><button class="btn-outline mini" id="toggleStoreBtn">${state.showStoreList?'Hide Stored Tasks':'Show Stored Tasks'}</button></div><div id="storeListWrap" style="margin-top:8px;display:${state.showStoreList?'block':'none'}">${storeHtml}</div></div>
<div class="card"><div class="section-head"><span class="section-dot"></span><div class="sub">Controls</div></div><div class="row" style="margin-top:10px"><button class="btn-outline mini" id="resetScoreBtn">Reset Score</button></div></div>`;
bindStoreDurationInput();document.getElementById('topupBtn').addEventListener('click',addTopup);document.getElementById('storeAddBtn').addEventListener('click',addTaskForFuture);document.getElementById('toggleStoreBtn').addEventListener('click',()=>{state.showStoreList=!state.showStoreList;save();render()});const taskBarTap=document.getElementById('taskBarTap');if(taskBarTap&&a)taskBarTap.addEventListener('click',togglePauseResume);const storeInput=document.getElementById('storeTaskInput');if(storeInput)storeInput.addEventListener('keydown',e=>{if(e.key==='Enter')addTaskForFuture()});document.getElementById('resetScoreBtn').addEventListener('click',resetScore);const successBtn=document.getElementById('successBtn');if(successBtn)successBtn.addEventListener('click',()=>finishTask('success'));const failBtn=document.getElementById('failBtn');if(failBtn)failBtn.addEventListener('click',()=>finishTask('fail'));document.querySelectorAll('[data-remove]').forEach(btn=>btn.addEventListener('click',()=>removeTask(Number(btn.getAttribute('data-remove')))));document.querySelectorAll('[data-copy-queue]').forEach(btn=>btn.addEventListener('click',()=>copyQueuedTask(Number(btn.getAttribute('data-copy-queue')))));document.querySelectorAll('[data-send-queue]').forEach(btn=>btn.addEventListener('click',()=>sendStoreTaskToQueue(Number(btn.getAttribute('data-send-queue')))));document.querySelectorAll('[data-store-delete]').forEach(btn=>btn.addEventListener('click',()=>deleteStoreTask(Number(btn.getAttribute('data-store-delete')))));document.querySelectorAll('[data-edit-store]').forEach(el=>el.addEventListener('click',()=>startEditStoreTask(Number(el.getAttribute('data-edit-store')))));document.querySelectorAll('[data-save-store-edit]').forEach(btn=>btn.addEventListener('click',()=>saveEditStoreTask(Number(btn.getAttribute('data-save-store-edit')))));document.querySelectorAll('[data-cancel-store-edit]').forEach(btn=>btn.addEventListener('click',cancelEditStoreTask));bindDragAndDrop()}
load();
window.addEventListener('load',()=>{const splash=document.getElementById('splashScreen'),app=document.getElementById('app');setTimeout(()=>{if(splash)splash.style.display='none';if(app)app.style.display='block';render();if(activeTask())autoSendMacroDroidForActiveTask();else clearMacroDroidState()},1000)});
setInterval(()=>{accountStarredWorkAndPenalties();autoFailIfOverdue();checkDeadlineWarnings();refreshLive()},1000);
</script>
