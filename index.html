<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#bfe7ff" />
  <title>Kartavya</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{
      --text:#f5f1e8;
      --muted:#c7bfae;
      --success:#22c55e;
      --danger:#ef4444;
      --soft-green:rgba(34,197,94,.16);
      --soft-green-border:rgba(34,197,94,.30);
      --soft-blue:rgba(59,130,246,.16);
      --soft-blue-border:rgba(96,165,250,.30);
      --gold:#f4b400;
      --gold-deep:#c88d00;
      --gold-soft:#ffd76a;
      --shadow:0 22px 54px rgba(0,0,0,.28);
      --shadow-soft:0 10px 24px rgba(0,0,0,.18);
      --radius-xl:26px;
      --queued-title:#dcecff;
      --store-title:#fff1c9;
      --queue-blue-1:#2563eb;
      --queue-blue-2:#3b82f6;
      --drag-light:rgba(255,255,255,.14);
      --drag-light-border:rgba(255,255,255,.18);
      --pause:#f59e0b;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,.35), transparent 18%),
        linear-gradient(180deg,#dff4ff,#cfeeff 48%,#bfe7ff);
      background-attachment:fixed;
    }
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:12px 12px 18px;display:none}
    .card{
      background:linear-gradient(180deg,rgba(28,28,28,.90),rgba(18,18,18,.88));
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(220,240,255,.35);
      border-radius:var(--radius-xl);
      padding:12px;box-shadow:var(--shadow);margin-bottom:10px;position:relative;overflow:hidden;
    }
    .card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));pointer-events:none}
    .space{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .title{font-size:26px;font-weight:800;letter-spacing:-.03em;color:#fff7dc;text-shadow:0 1px 10px rgba(244,180,0,.08)}
    .sub{font-size:18px;font-weight:800;letter-spacing:-.02em;color:#fff5d7}
    .section-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
    .section-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));box-shadow:0 0 0 5px rgba(244,180,0,.10),0 0 18px rgba(244,180,0,.26);flex:0 0 auto}
    .small{font-size:12px;color:var(--muted)}
    .pill{padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;box-shadow:var(--shadow-soft)}
    .green-pill{background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(34,197,94,.08));color:#d8ffe6;border:1px solid rgba(34,197,94,.24)}
    .logo-wrap{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,rgba(244,180,0,.22),rgba(244,180,0,.06));box-shadow:inset 0 0 0 1px rgba(244,180,0,.28),0 6px 16px rgba(244,180,0,.18);flex:0 0 auto}
    .logo{font-size:18px}

    .current-cycle-dot,.paused-cycle-dot{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:8px;box-shadow:0 0 0 4px rgba(244,180,0,.10)}
    .current-cycle-dot{animation:cycleTraffic 1.35s infinite}
    .paused-cycle-dot{background:var(--pause);box-shadow:0 0 0 4px rgba(245,158,11,.12)}
    .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;flex:0 0 auto}
    .status-dot.red{background:var(--danger);animation:blink 1s infinite;box-shadow:0 0 0 4px rgba(239,68,68,.12)}
    .status-dot.green{background:var(--success);box-shadow:0 0 0 4px rgba(34,197,94,.12)}
    .star-item-name{color:var(--gold-soft) !important}
    .star-current-gold{color:var(--gold-soft) !important}
    .star-current-green{color:#7dff9c !important}
    .star-rule{font-size:11px;font-weight:800;color:var(--gold-soft);margin-top:4px;margin-bottom:0;text-shadow:0 1px 4px rgba(244,180,0,.18);white-space:nowrap}

    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.9)}}
    @keyframes cycleTraffic{0%,24%{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.12)}25%,49%{background:#f4b400;box-shadow:0 0 0 4px rgba(244,180,0,.12)}50%,74%{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.12)}75%,100%{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.12)}}
    @keyframes pulse-danger{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.12)}}
    @keyframes pulse-warning{0%,100%{box-shadow:0 0 0 rgba(244,180,0,0)}50%{box-shadow:0 0 0 7px rgba(244,180,0,.10)}}
    @keyframes pulse-safe{0%,100%{box-shadow:0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.08)}}
    @keyframes dotBlink{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.15)}50%{transform:scale(1.35);box-shadow:0 0 0 6px rgba(244,180,0,.16)}}
    @keyframes splashFade{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
    @keyframes targetGlow{0%,100%{box-shadow:0 0 0 0 rgba(244,180,0,.08)}50%{box-shadow:0 0 28px 8px rgba(244,180,0,.22)}}
    @keyframes bullImpact{0%,60%{box-shadow:0 0 0 0 rgba(244,180,0,0);transform:scale(1)}75%{box-shadow:0 0 0 12px rgba(244,180,0,.22),0 0 24px rgba(244,180,0,.42);transform:scale(1.22)}100%{box-shadow:0 0 0 5px rgba(244,180,0,.14),0 0 12px rgba(244,180,0,.24);transform:scale(1)}}
    @keyframes arrowHitExact{0%{opacity:0;transform:translate(34px,-34px) scale(.92)}18%{opacity:1}70%{opacity:1;transform:translate(0,0) scale(1)}82%{opacity:1;transform:translate(-2px,2px) scale(1.03)}100%{opacity:1;transform:translate(0,0) scale(1)}}

    label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--muted)}
    input{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(244,180,0,.18);font-size:15px;outline:none;background:rgba(255,255,255,.10);color:#fff7e6;box-shadow:inset 0 1px 2px rgba(0,0,0,.20)}
    input::placeholder{color:#c9b78c}
    input:focus{border-color:rgba(244,180,0,.38);box-shadow:0 0 0 4px rgba(244,180,0,.08)}
    #storeTaskInput{background:var(--soft-green);border:1px solid var(--soft-green-border)}
    .duration-input{padding:12px;border-radius:14px;border:1px solid var(--soft-blue-border);font-size:15px;background:var(--soft-blue)}

    button{width:100%;padding:11px 12px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;border:none;transition:transform .12s ease,opacity .12s ease,box-shadow .15s ease,filter .15s ease}
    button:hover{filter:brightness(1.04)}
    button:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,#171717,#2a2a2a);color:#fff8e1;border:1px solid rgba(244,180,0,.14);box-shadow:0 8px 20px rgba(0,0,0,.28)}
    .btn-gold{background:linear-gradient(135deg,var(--gold-soft),var(--gold),var(--gold-deep));color:#16120a;box-shadow:0 8px 22px rgba(244,180,0,.28)}
    .btn-outline{background:rgba(255,255,255,.09);color:#fff3d2;border:1px solid rgba(244,180,0,.14);box-shadow:var(--shadow-soft)}
    .btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(34,197,94,.24)}
    .btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(239,68,68,.24)}
    .btn-queue{background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));color:#fff;border:2px solid rgba(255,255,255,.10);box-shadow:0 10px 22px rgba(37,99,235,.22)}
    .btn-delete{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:2px solid rgba(255,255,255,.10);box-shadow:0 10px 22px rgba(239,68,68,.22)}
    .drag-handle{width:auto;padding:6px 10px;border-radius:10px;font-size:15px;line-height:1;font-weight:800;color:#eef4ff;background:var(--drag-light);border:1px solid var(--drag-light-border);box-shadow:var(--shadow-soft);cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;flex:0 0 auto}
    .mini{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;white-space:nowrap;flex:0 0 auto}
    .tiny-btn{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;font-weight:800}
    .mini-copy{background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));color:#fff;border:2px solid rgba(255,255,255,.10);box-shadow:0 10px 22px rgba(37,99,235,.22)}

    .action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .action-buttons button{padding:10px 8px;min-height:44px;border-radius:14px;font-size:13px;line-height:1.15;letter-spacing:.01em;text-shadow:0 1px 2px rgba(0,0,0,.18)}
    .bar-wrap{position:relative;width:100%;height:38px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);margin-top:8px;display:flex;border:1px solid rgba(244,180,0,.14);box-shadow:inset 0 3px 8px rgba(255,255,255,.06),inset 0 -6px 14px rgba(0,0,0,.22),0 10px 22px rgba(0,0,0,.18)}
    .bar-wrap.tappable{cursor:pointer;transition:transform .08s ease,box-shadow .12s ease,filter .12s ease;border-color:rgba(255,255,255,.18)}
    .bar-wrap.tappable:active{transform:translateY(1px) scale(.995)}
    .bar-wrap.paused{border-color:rgba(245,158,11,.35);box-shadow:inset 0 3px 8px rgba(255,255,255,.05),inset 0 -6px 14px rgba(0,0,0,.22),0 10px 22px rgba(245,158,11,.14)}
    .bar-done{background:linear-gradient(90deg,#ff5a5a,#ff8080);height:100%;transition:width .5s ease}
    .bar-left{background:linear-gradient(90deg,#16a34a,#22c55e);height:100%;transition:width .5s ease}
    .bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.50);pointer-events:none;letter-spacing:.02em}

    .performance-wrap{margin-top:10px}
    .performance-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .perf-box{border-radius:18px;padding:10px 8px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-soft)}
    .perf-box h4{margin:0;font-size:11px;line-height:1.15;font-weight:800;color:#d7c6a0}
    .perf-box .val{font-size:18px;font-weight:800;line-height:1.1;word-break:break-word}
    .perf-reward{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.08))}
    .perf-penalty{background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.08))}
    .perf-wallet{background:linear-gradient(135deg,rgba(244,180,0,.18),rgba(244,180,0,.08))}

    .focus-tracker{margin-top:10px;padding:9px 10px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-soft)}
    .focus-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;font-weight:900;color:var(--gold-soft)}
    .focus-period{font-size:10px;color:#c9b78c;font-weight:800;white-space:nowrap}
    .focus-dots{display:grid;grid-template-columns:repeat(14,1fr);gap:6px;align-items:center}
    .focus-dot{width:13px;height:13px;border-radius:50%;justify-self:center;background:#ffffff;border:1px solid rgba(255,255,255,.70);box-shadow:inset 0 1px 2px rgba(0,0,0,.20),0 2px 7px rgba(0,0,0,.24)}
    .focus-dot.green{background:#22c55e;border-color:rgba(125,255,156,.88)}
    .focus-dot.red{background:#ef4444;border-color:rgba(255,180,180,.88)}
    .focus-dot.current{animation:dotBlink 1s infinite;outline:1px solid rgba(244,180,0,.72);outline-offset:3px}

    .paired-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-top:10px}
    .paired-box{border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:10px;background:rgba(255,255,255,.06);box-shadow:var(--shadow-soft);min-width:0}
    .list-title{font-size:17px;font-weight:800;margin:0 0 8px 0;color:#fff5d7}
    .queued-panel,.store-panel{background:radial-gradient(circle at top left,rgba(255,255,255,.03),transparent 32%),linear-gradient(180deg,rgba(28,28,28,.90),rgba(18,18,18,.88));box-shadow:var(--shadow)}
    .queued-panel{border:1px solid rgba(120,190,255,.34);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 14px 34px rgba(96,165,250,.12)}
    .queued-panel .list-title{color:var(--queued-title)}
    .queued-panel .section-dot{background:linear-gradient(135deg,#93c5fd,#3b82f6);box-shadow:0 0 0 5px rgba(96,165,250,.10),0 0 18px rgba(96,165,250,.24)}
    .store-panel{border:1px solid rgba(255,220,108,.32);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 14px 34px rgba(244,180,0,.12)}
    .store-panel .list-title{color:var(--store-title)}
    .store-panel .section-dot{background:linear-gradient(135deg,#ffe08a,#f4b400);box-shadow:0 0 0 5px rgba(244,180,0,.10),0 0 18px rgba(244,180,0,.24)}
    .draggable-item{border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:8px 9px;margin-top:7px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));box-shadow:0 6px 14px rgba(0,0,0,.14)}
    .draggable-item.active{background:linear-gradient(135deg,rgba(34,197,94,.20),rgba(34,197,94,.10));border-color:rgba(34,197,94,.28)}
    .draggable-item.over{outline:2px dashed rgba(147,197,253,.75);outline-offset:2px}
    .draggable-item.drag-source{opacity:.65}
    .queue-row,.store-row{display:grid;align-items:center;gap:8px;grid-template-columns:minmax(0,1fr) auto auto auto}
    .item-name{font-weight:800;line-height:1.22;font-size:13px;word-break:break-word;color:#fff8e9;min-width:0}
    .item-meta{font-size:11px;color:#c9b78c;margin-top:5px;font-weight:700;line-height:1.2}
    .top-card{border:1px solid rgba(220,240,255,.35);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,var(--shadow)}
    .top-card.safe{animation:pulse-safe 2.2s infinite}
    .top-card.warning{animation:pulse-warning 1.4s infinite}
    .top-card.danger{animation:pulse-danger 1s infinite}
    .top-card.paused{animation:none;border-color:rgba(245,158,11,.30);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 0 0 6px rgba(245,158,11,.05),var(--shadow)}
    .task-meta{margin-top:8px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;font-size:13px;font-weight:800;color:#c9b78c}
    .empty-state{font-size:12px;font-weight:700;padding:8px 2px}

    .splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at top,rgba(244,180,0,.14),transparent 28%),linear-gradient(180deg,#080808,#111111);color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;animation:splashFade .9s ease}
    .splash-logo{width:116px;height:116px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:22px;animation:targetGlow 1.8s ease-in-out infinite}
    .splash-target{position:relative;width:116px;height:116px;border-radius:50%}
    .ring1,.ring2,.ring3,.bull{position:absolute;inset:0;margin:auto;border-radius:50%;border:4px solid var(--gold)}
    .ring1{width:112px;height:112px}.ring2{width:74px;height:74px}.ring3{width:38px;height:38px}
    .bull{width:14px;height:14px;border:none;background:var(--gold);animation:bullImpact 1.25s ease-out forwards}
    .arrow-svg{position:absolute;inset:0;width:116px;height:116px;z-index:8;overflow:visible;pointer-events:none}
    .arrow-line{stroke:#fff;stroke-width:6;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(255,255,255,.28))}
    .arrow-head{fill:#fff;filter:drop-shadow(0 0 6px rgba(255,255,255,.28))}
    .arrow-group{opacity:0;transform:translate(18px,-18px);animation:arrowHitExact 1.2s ease-out forwards;transform-origin:58px 58px}
    .splash-title{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
    .splash-tagline{font-size:19px;font-weight:700;color:var(--gold-soft);margin-bottom:18px}
    .splash-sub{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.03em}

    @media (max-width:380px){
      .app{padding:10px 10px 16px}.title{font-size:23px}.sub{font-size:16px}.bar-wrap{height:34px}.bar-label{font-size:13px}.action-buttons button{font-size:11px;padding:9px 6px}.perf-box .val{font-size:16px}.list-title{font-size:15px}.mini,.drag-handle{font-size:10px;padding:5px 7px}.queue-row,.store-row{gap:6px}.focus-dots{gap:4px}.focus-dot{width:11px;height:11px}
    }
  </style>
</head>
<body>
  <div class="splash" id="splashScreen">
    <div class="splash-logo">
      <div class="splash-target">
        <div class="ring1"></div><div class="ring2"></div><div class="ring3"></div><div class="bull"></div>
        <svg class="arrow-svg" viewBox="0 0 116 116" aria-hidden="true"><g class="arrow-group"><line x1="104" y1="12" x2="58" y2="58" class="arrow-line"></line><polygon points="58,58 68,54 62,48" class="arrow-head"></polygon></g></svg>
      </div>
    </div>
    <div class="splash-title">Kartavya</div>
    <div class="splash-tagline">Discipline is Wealth</div>
    <div class="splash-sub">KARTAVYA DISCIPLINE SYSTEM</div>
  </div>

  <div class="app" id="app"></div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(reg=>reg.unregister());});}

const STORAGE_KEY='kartavya-main-data';
const TOPUP=5000;
const DEFAULT_WALLET=5000;
const DEFAULT_REWARD=50;
const DEFAULT_PENALTY=200;
const DEFAULT_DURATION=30;
const STAR_HOUR_PENALTY=30;
const STAR_MINUTES_PER_HOUR_MS=30*60*1000;
const STAR_START_HOUR=8;
const STAR_END_HOUR=22;
const STAR_TOTAL_HOURS=STAR_END_HOUR-STAR_START_HOUR;
const MACRODROID_WEBHOOK_URL='https://trigger.macrodroid.com/9d8de64f-05db-49f9-9470-18e7f06404e1/kartavya_timer';

const state={
  wallet:DEFAULT_WALLET,
  reward:String(DEFAULT_REWARD),
  penalty:String(DEFAULT_PENALTY),
  storeDurationText:'30 min',
  tasks:[],
  taskStore:[],
  history:[],
  activeTaskId:null,
  soundEnabled:true,
  vibrationEnabled:true,
  showStoreList:false,
  starHourWorkMs:{},
  starHourPenaltyApplied:{},
  lastWorkSliceAt:null
};
const dragState={list:null,id:null,overId:null};

function sanitizeNumber(value,fallback){const n=Number(value);return Number.isFinite(n)&&n>=0?n:fallback;}
function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function rupee(n){return '₹'+Number(n||0).toLocaleString('en-IN');}
function todayKey(dateObj=new Date()){return dateObj.getFullYear()+'-'+String(dateObj.getMonth()+1).padStart(2,'0')+'-'+String(dateObj.getDate()).padStart(2,'0');}
function hourKey(dateObj){return todayKey(dateObj)+'-'+String(dateObj.getHours()).padStart(2,'0');}
function formatDuration(mins){mins=Math.max(0,Math.round(Number(mins)||0));if(mins<60)return mins+' min';const h=Math.floor(mins/60),m=mins%60;return m===0?h+' hr':h+' hr '+m+' min';}
function formatTimeLeftDisplay(seconds){seconds=Math.max(0,Math.floor(Number(seconds)||0));const mins=Math.floor(seconds/60);if(mins<60)return 'Time left '+mins+' min';const h=Math.floor(mins/60),m=mins%60;return 'Time left '+h+' hr '+m+' min';}
function parseDurationToMinutes(text){if(typeof text!=='string')return null;const raw=text.trim().toLowerCase();if(!raw)return null;let total=0,matched=false;const hr=raw.match(/(\d+(?:\.\d+)?)\s*(hr|hrs|hour|hours|h)\b/);const mn=raw.match(/(\d+)\s*(min|mins|minute|minutes|m)\b/);if(hr){total+=Math.round(parseFloat(hr[1])*60);matched=true;}if(mn){total+=parseInt(mn[1],10);matched=true;}if(matched&&total>0)return total;if(/^\d+$/.test(raw))return parseInt(raw,10);return null;}
function normalizeDurationInput(text){const mins=parseDurationToMinutes(text);if(mins===null||mins<=0)return null;return{minutes:mins,text:formatDuration(mins)};}
function isStarredTaskName(name){return /^\s*\*/.test(String(name||''));}
function toggleStoreList(){state.showStoreList=!state.showStoreList;save();render();}
function normalizeQueueOrdering(){const starred=[],normal=[];state.tasks.forEach(item=>{(isStarredTaskName(item.taskName)?starred:normal).push(item);});state.tasks=[...starred,...normal];}
function normalizeTaskStoreOrdering(){const starred=[],open=[],done=[];state.taskStore.forEach(item=>{if(isStarredTaskName(item.taskName))starred.push(item);else if(item.completed)done.push(item);else open.push(item);});state.taskStore=[...starred,...open,...done];}

function addStarWorkSlice(startMs,endMs){let changed=false;let cursor=startMs;while(cursor<endMs){const d=new Date(cursor);const hr=d.getHours();const next=new Date(d);next.setMinutes(0,0,0);next.setHours(hr+1);const sliceEnd=Math.min(endMs,next.getTime());if(hr>=STAR_START_HOUR&&hr<STAR_END_HOUR){const key=hourKey(d);state.starHourWorkMs[key]=(state.starHourWorkMs[key]||0)+(sliceEnd-cursor);changed=true;}cursor=sliceEnd;}return changed;}
function ensureStarHourPenalties(){let changed=false;const now=new Date();const dates=[new Date(now),new Date(now.getTime()-86400000)];dates.forEach(day=>{const y=day.getFullYear(),m=day.getMonth(),dt=day.getDate();for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){const slotEnd=new Date(y,m,dt,h+1,0,0,0);const key=todayKey(new Date(y,m,dt))+'-'+String(h).padStart(2,'0');if(Date.now()>=slotEnd.getTime()&&!state.starHourPenaltyApplied[key]){const worked=state.starHourWorkMs[key]||0;if(worked<STAR_MINUTES_PER_HOUR_MS){state.wallet=Math.max(0,state.wallet-STAR_HOUR_PENALTY);state.history.unshift({id:Date.now()+Math.floor(Math.random()*1000),taskName:'★ Task shortfall '+key,reward:0,penalty:STAR_HOUR_PENALTY,result:'fail',completedAt:new Date().toISOString(),isStarHourPenalty:true,penaltyDate:key});}state.starHourPenaltyApplied[key]=true;changed=true;}}});return changed;}
function markPastStarHoursAsHandled(){const now=new Date();const dates=[new Date(now),new Date(now.getTime()-86400000)];dates.forEach(day=>{const y=day.getFullYear(),m=day.getMonth(),dt=day.getDate();for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){const slotEnd=new Date(y,m,dt,h+1,0,0,0);const key=todayKey(new Date(y,m,dt))+'-'+String(h).padStart(2,'0');if(Date.now()>=slotEnd.getTime())state.starHourPenaltyApplied[key]=true;}});}
function accountStarredWorkAndPenalties(){const now=Date.now();if(!state.lastWorkSliceAt){state.lastWorkSliceAt=now;save();return;}let changed=false;const a=activeTask();if(a&&isStarredTaskName(a.taskName)&&!a.isPaused){changed=addStarWorkSlice(state.lastWorkSliceAt,now)||changed;}state.lastWorkSliceAt=now;changed=ensureStarHourPenalties()||changed;if(changed)save();}
function currentHourStarSatisfied(){const now=new Date();const key=hourKey(now);return(state.starHourWorkMs[key]||0)>=STAR_MINUTES_PER_HOUR_MS;}

function currentTaskHtml(a){if(!a)return'No active task';const dot=a.isPaused?'paused-cycle-dot':'current-cycle-dot';const cls=currentTaskTextClass(a);return'<span class="'+dot+'"></span><span class="'+cls+'">'+escapeHtml(a.taskName)+'</span>';}

function focusDotData(){const now=new Date();const today=todayKey(now);let greenCount=0;const dots=[];for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){const key=today+'-'+String(h).padStart(2,'0');const worked=state.starHourWorkMs[key]||0;const slotEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h+1,0,0,0).getTime();const isCurrent=now.getHours()===h;let color='white';if(worked>=STAR_MINUTES_PER_HOUR_MS){color='green';greenCount++;}else if(Date.now()>=slotEnd){color='red';}dots.push({hour:h,color,isCurrent,worked});}return{greenCount,dots};}
function focusDotsHtml(){const data=focusDotData();const dotsHtml=data.dots.map(d=>'<span class="focus-dot '+d.color+(d.isCurrent?' current':'')+'" title="'+d.hour+':00-'+(d.hour+1)+':00"></span>').join('');return '<div class="focus-tracker"><div class="focus-head"><span>*Main Task Today <span id="mainTaskTodayCount">'+data.greenCount+'/'+STAR_TOTAL_HOURS+'</span></span><span class="focus-period">8 AM–10 PM</span></div><div class="focus-dots" id="focusDots">'+dotsHtml+'</div></div>';}
function refreshFocusDots(){const data=focusDotData();const count=document.getElementById('mainTaskTodayCount');const wrap=document.getElementById('focusDots');if(count)count.textContent=data.greenCount+'/'+STAR_TOTAL_HOURS;if(wrap){wrap.innerHTML=data.dots.map(d=>'<span class="focus-dot '+d.color+(d.isCurrent?' current':'')+'" title="'+d.hour+':00-'+(d.hour+1)+':00"></span>').join('');}}

function sendMacroDroidState(taskName,reminderEpoch,taskState,successMessage='',silent=false){if(!MACRODROID_WEBHOOK_URL||MACRODROID_WEBHOOK_URL.includes('PASTE_YOUR_MACRODROID_WEBHOOK_URL_HERE')){if(!silent)alert('Please paste your MacroDroid webhook URL in the HTML file first.');return Promise.resolve(false);}const sep=MACRODROID_WEBHOOK_URL.includes('?')?'&':'?';const url=MACRODROID_WEBHOOK_URL+sep+'task_name='+encodeURIComponent(taskName||'')+'&reminder_epoch='+encodeURIComponent(Math.max(0,Math.round(Number(reminderEpoch)||0)))+'&task_state='+encodeURIComponent(taskState||'none');return fetch(url,{method:'GET',mode:'no-cors'}).then(()=>{if(!silent&&successMessage)alert(successMessage);return true;}).catch(()=>{if(!silent)alert('Could not contact MacroDroid. Check internet and webhook URL.');return false;});}

function autoSendMacroDroidForActiveTask(){const a=activeTask();if(!a||!a.deadline||a.isPaused)return clearMacroDroidState();if(a.macroStateSentForTaskId===a.id)return;const remainingMs=Math.max(0,new Date(a.deadline).getTime()-Date.now());if(remainingMs<=5*60*1000)return clearMacroDroidState();const reminderEpoch=Math.max(0,new Date(a.deadline).getTime()-5*60*1000);sendMacroDroidState(a.taskName,reminderEpoch,'active','',true).then(ok=>{if(ok){a.macroStateSentForTaskId=a.id;save();}});}

function activateTask(task){if(!task)return;if(task.activatedAt&&task.deadline)return;const now=new Date();const durationMinutes=Math.max(1,sanitizeNumber(task.durationMinutes,DEFAULT_DURATION));task.durationMinutes=durationMinutes;task.durationText=formatDuration(durationMinutes);task.activatedAt=now.toISOString();task.deadline=new Date(now.getTime()+durationMinutes*60000).toISOString();task.isPaused=false;task.pausedAt=null;task.pausedRemainingMs=null;task.pausedUsedMs=null;task.macroStateSentForTaskId=null;task.autoReminderSent=false;}
function migrateTasks(){state.tasks=state.tasks.map((task,index)=>{if(typeof task.taskName!=='string')task.taskName='Task';task.reward=sanitizeNumber(task.reward,DEFAULT_REWARD);task.penalty=sanitizeNumber(task.penalty,DEFAULT_PENALTY);task.durationMinutes=Math.max(1,sanitizeNumber(task.durationMinutes,DEFAULT_DURATION));task.durationText=formatDuration(task.durationMinutes);if(typeof task.autoReminderSent!=='boolean')task.autoReminderSent=false;if(typeof task.macroStateSentForTaskId==='undefined')task.macroStateSentForTaskId=null;if(typeof task.isPaused!=='boolean')task.isPaused=false;if(typeof task.pausedRemainingMs!=='number')task.pausedRemainingMs=null;if(typeof task.pausedUsedMs!=='number')task.pausedUsedMs=null;if(typeof task.pausedAt!=='string')task.pausedAt=null;if(index!==0&&!task.activatedAt){delete task.deadline;delete task.activatedAt;}return task;});}
function migrateTaskStore(){state.taskStore=state.taskStore.map((item,idx)=>({id:item&&item.id?item.id:Date.now()+idx,taskName:item&&typeof item.taskName==='string'&&item.taskName.trim()?item.taskName.trim():'Stored Task',durationMinutes:Math.max(1,sanitizeNumber(item&&item.durationMinutes,DEFAULT_DURATION)),completed:!!(item&&item.completed),autoServed:!!(item&&item.autoServed),createdAt:item&&item.createdAt?item.createdAt:new Date().toISOString()}));}
function secondsLeft(d){return Math.max(0,Math.floor((new Date(d)-new Date())/1000));}
function activeTask(){if(!state.activeTaskId)return null;return state.tasks.find(x=>x.id===state.activeTaskId)||null;}
function syncActive(){if(!state.tasks.length){state.activeTaskId=null;save();return;}const exists=state.tasks.some(x=>x.id===state.activeTaskId);if(!exists)state.activeTaskId=state.tasks[0].id;activateTask(activeTask());save();}
function currentProgressPercent(a){if(!a||!a.deadline||!a.activatedAt)return 0;const total=Math.max(1,new Date(a.deadline)-new Date(a.activatedAt));if(a.isPaused){const used=Math.max(0,Number(a.pausedUsedMs)||0);return Math.max(0,Math.min(100,Math.round((used/total)*100)));}const used=Math.max(0,new Date()-new Date(a.activatedAt));return Math.max(0,Math.min(100,Math.round((used/total)*100)));}
function currentRemainingText(a){if(!a)return'Time left 0 min';if(a.isPaused)return'Paused • Tap to Resume';return formatTimeLeftDisplay(secondsLeft(a.deadline))+' • Tap to Pause';}
function pauseActiveTask(){const a=activeTask();if(!a||a.isPaused||!a.deadline||!a.activatedAt)return;const nowMs=Date.now(),deadlineMs=new Date(a.deadline).getTime(),activatedMs=new Date(a.activatedAt).getTime();a.pausedRemainingMs=Math.max(0,deadlineMs-nowMs);a.pausedUsedMs=Math.max(0,nowMs-activatedMs);a.pausedAt=new Date().toISOString();a.isPaused=true;a.macroStateSentForTaskId=null;save();render();clearMacroDroidState();}
function resumeActiveTask(){const a=activeTask();if(!a||!a.isPaused)return;const remainingMs=Math.max(0,Number(a.pausedRemainingMs)||0),usedMs=Math.max(0,Number(a.pausedUsedMs)||0),nowMs=Date.now();a.activatedAt=new Date(nowMs-usedMs).toISOString();a.deadline=new Date(nowMs+remainingMs).toISOString();a.isPaused=false;a.pausedAt=null;a.pausedRemainingMs=null;a.pausedUsedMs=null;a.macroStateSentForTaskId=null;save();render();autoSendMacroDroidForActiveTask();}

function alarm(type='normal'){if(state.soundEnabled){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=type==='danger'?220:660;gain.gain.value=.04;osc.start();osc.stop(ctx.currentTime+.22);}catch(e){}}if(state.vibrationEnabled&&navigator.vibrate)navigator.vibrate(type==='danger'?[250,120,250]:[120,60,120]);}

function buildTask(taskName,durationMinutes,sourceType='',sourceId=null){return{id:Date.now()+Math.floor(Math.random()*1000),taskName:taskName.trim(),reward:sanitizeNumber(state.reward,DEFAULT_REWARD),penalty:sanitizeNumber(state.penalty,DEFAULT_PENALTY),durationMinutes,durationText:formatDuration(durationMinutes),createdAt:new Date().toISOString(),sourceType,sourceId,autoReminderSent:false,macroStateSentForTaskId:null,isPaused:false,pausedAt:null,pausedRemainingMs:null,pausedUsedMs:null};}

function refreshLive(){const a=activeTask(),current=document.getElementById('currentTaskText'),clockInline=document.getElementById('timeLeftInline'),doneBar=document.getElementById('doneBar'),leftBar=document.getElementById('leftBar'),percent=document.getElementById('successPercent'),topCard=document.getElementById('topCard'),activeDuration=document.getElementById('activeDurationText'),deadlineStatus=document.getElementById('deadlineStatusText'),taskBar=document.getElementById('taskBarTap');if(percent)percent.textContent=successPercent()+'% Success';refreshFocusDots();if(a){const overdue=!a.isPaused&&a.deadline&&(new Date(a.deadline)-new Date())<=0;if(topCard)topCard.className='card top-card '+(a.isPaused?'paused':(overdue?'danger':urgencyClass()));if(current)current.innerHTML=currentTaskHtml(a);if(clockInline)clockInline.textContent=a.isPaused?'Paused • Tap to Resume':(overdue?'Overdue • Tap to Pause':currentRemainingText(a));if(activeDuration)activeDuration.textContent=formatDuration(a.durationMinutes||0);if(deadlineStatus){deadlineStatus.textContent=a.isPaused?'Paused':(overdue?'Deadline crossed':'Ends: '+new Date(a.deadline).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));}const pct=overdue?100:currentProgressPercent(a);if(doneBar)doneBar.style.width=pct+'%';if(leftBar)leftBar.style.width=(100-pct)+'%';if(taskBar)taskBar.className='bar-wrap tappable'+(a.isPaused?' paused':'');}else{if(topCard)topCard.className='card top-card safe';if(current)current.textContent='No active task';if(clockInline)clockInline.textContent='Time left 0 min';if(activeDuration)activeDuration.textContent='--';if(deadlineStatus)deadlineStatus.textContent='';if(doneBar)doneBar.style.width='0%';if(leftBar)leftBar.style.width='100%';if(taskBar)taskBar.className='bar-wrap';}}
function render(){const app=document.getElementById('app'),a=activeTask(),s=stats(),urgency=urgencyClass();const storeToggleText=state.showStoreList?'Hide Stored Tasks':'Show Stored Tasks';const overdue=!!(a&&!a.isPaused&&a.deadline&&(new Date(a.deadline)-new Date())<=0);const currentTaskHtmlText=currentTaskHtml(a);const endText=a?(a.isPaused?'Paused':(overdue?'Deadline crossed':'Ends: '+new Date(a.deadline).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}))):'';const successButtonText='✔️ Success (Get '+rupee(Number(state.reward||DEFAULT_REWARD))+')';const failButtonText='❌ Failed (Pay '+rupee(Number(state.penalty||DEFAULT_PENALTY))+')';const timeLeftText=a?(a.isPaused?'Paused • Tap to Resume':(overdue?'Overdue • Tap to Pause':currentRemainingText(a))):'Time left 0 min';
const queueHtml=state.tasks.length?state.tasks.map((item,idx)=>{const isActive=item.id===state.activeTaskId;const isStar=isStarredTaskName(item.taskName);const label=isActive?'▶ ':(isStar?'':(idx+1)+'. ');return'<div class="draggable-item'+(isActive?' active':'')+'" data-list="queue" data-id="'+item.id+'"><div class="queue-row"><div><div class="item-name '+(isStar?'star-item-name':'')+'">'+label+escapeHtml(item.taskName)+'</div><div class="item-meta">'+formatDuration(item.durationMinutes||0)+'</div></div><button class="mini mini-copy" data-copy-queue="'+item.id+'">Copy</button><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="queue" data-id="'+item.id+'">⋮⋮</button><button class="btn-delete mini" data-remove="'+item.id+'">Delete</button></div></div>';}).join(''):'<div class="empty-state">No queued task yet.</div>';
const storeHtml=state.taskStore.length?state.taskStore.map((item,idx)=>{const dotClass=item.completed?'green':'red';const isStar=isStarredTaskName(item.taskName);const label=isStar?'':(idx+1)+'. ';return'<div class="draggable-item" data-list="store" data-id="'+item.id+'"><div class="store-row"><div><div class="item-name '+(isStar?'star-item-name':'')+'"><span class="status-dot '+dotClass+'"></span>'+label+escapeHtml(item.taskName)+'</div><div class="item-meta">'+formatDuration(item.durationMinutes)+'</div></div><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="store" data-id="'+item.id+'">⋮⋮</button><button class="btn-queue mini" data-send-queue="'+item.id+'">Queue</button><button class="btn-delete mini" data-store-delete="'+item.id+'">Delete</button></div></div>';}).join(''):'<div class="empty-state">No task stored yet.</div>';
app.innerHTML=`
<div class="card top-card ${a&&a.isPaused?'paused':(overdue?'danger':urgency)}" id="topCard">
  <div class="space">
    <div class="row" style="min-width:0;flex:1">
      <div class="title">Kartavya</div><div class="logo-wrap"><div class="logo">🎯</div></div><div id="successPercent" class="small pill green-pill">${successPercent()}% Success</div>
    </div>
    <div style="min-width:0;flex:1;text-align:right">
      <div class="small">Current Task</div><div class="sub" id="currentTaskText" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentTaskHtmlText}</div><div class="star-rule" style="text-align:right;">★Task: 30 min/hr or lose ₹30</div>
    </div>
  </div>
  <div class="bar-wrap ${a?'tappable':''} ${a&&a.isPaused?'paused':''}" id="taskBarTap"><div class="bar-done" id="doneBar" style="width:${a?(overdue?100:currentProgressPercent(a)):0}%"></div><div class="bar-left" id="leftBar" style="width:${a?(overdue?0:100-currentProgressPercent(a)):100}%"></div><div class="bar-label" id="timeLeftInline">${timeLeftText}</div></div>
  <div class="task-meta"><div>Duration: <span id="activeDurationText">${a?formatDuration(a.durationMinutes||0):'--'}</span></div><div id="deadlineStatusText">${endText}</div></div>
  <div class="action-buttons"><button class="btn-success" id="successBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${successButtonText}</button><button class="btn-danger" id="failBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${failButtonText}</button></div>
</div>
<div class="card">
  <div class="section-head"><span class="section-dot"></span><div class="sub">Your Performance</div></div>
  <div class="performance-wrap"><div class="performance-grid"><div class="perf-box perf-reward"><h4>Total Reward</h4><div class="val" style="color:#d8ffe6">${rupee(s.reward)}</div></div><div class="perf-box perf-penalty"><h4>Total Penalty</h4><div class="val" style="color:#ffd0d0">${rupee(s.penalty)}</div></div><div class="perf-box perf-wallet"><h4>Wallet Balance</h4><div class="val">${rupee(state.wallet)}</div><button class="btn-primary tiny-btn" id="topupBtn">+${rupee(TOPUP)}</button></div></div></div>
  ${focusDotsHtml()}
</div>
<div class="card queued-panel"><div class="section-head"><span class="section-dot"></span><div class="list-title">Queued Task</div></div>${queueHtml}</div>
<div class="card store-panel">
  <div class="section-head"><span class="section-dot"></span><div class="list-title">Task Store</div></div>
  <div class="paired-grid"><div class="paired-box"><label>Task</label><input id="storeTaskInput" value="" placeholder="Enter Task"></div><div class="paired-box"><label>Duration</label><input id="storeDurationInput" class="duration-input" value="${escapeHtml(state.storeDurationText)}" placeholder="e.g. 30 min"></div></div>
  <div class="row" style="margin-top:8px"><button class="btn-gold" id="storeAddBtn" style="flex:1">Add Task</button><button class="btn-outline mini" id="toggleStoreBtn">${storeToggleText}</button></div>
  <div id="storeListWrap" style="margin-top:8px;display:${state.showStoreList?'block':'none'}">${storeHtml}</div>
</div>
<div class="card"><div class="section-head"><span class="section-dot"></span><div class="sub">Controls</div></div><div class="row" style="margin-top:10px"><button class="btn-outline mini" id="resetScoreBtn">Reset Score</button></div></div>`;
bindStoreDurationInput();document.getElementById('topupBtn').addEventListener('click',addTopup);document.getElementById('storeAddBtn').addEventListener('click',addTaskForFuture);document.getElementById('toggleStoreBtn').addEventListener('click',toggleStoreList);const taskBarTap=document.getElementById('taskBarTap');if(taskBarTap&&a)taskBarTap.addEventListener('click',togglePauseResume);const storeInput=document.getElementById('storeTaskInput');if(storeInput)storeInput.addEventListener('keydown',e=>{if(e.key==='Enter')addTaskForFuture();});document.getElementById('resetScoreBtn').addEventListener('click',resetScore);const successBtn=document.getElementById('successBtn');if(successBtn)successBtn.addEventListener('click',()=>finishTask('success'));const failBtn=document.getElementById('failBtn');if(failBtn)failBtn.addEventListener('click',()=>finishTask('fail'));document.querySelectorAll('[data-remove]').forEach(btn=>btn.addEventListener('click',()=>removeTask(Number(btn.getAttribute('data-remove')))));document.querySelectorAll('[data-copy-queue]').forEach(btn=>btn.addEventListener('click',()=>copyQueuedTask(Number(btn.getAttribute('data-copy-queue')))));document.querySelectorAll('[data-send-queue]').forEach(btn=>btn.addEventListener('click',()=>sendStoreTaskToQueue(Number(btn.getAttribute('data-send-queue')))));document.querySelectorAll('[data-store-delete]').forEach(btn=>btn.addEventListener('click',()=>deleteStoreTask(Number(btn.getAttribute('data-store-delete')))));bindDragAndDrop();}

load();
window.addEventListener('load',()=>{const splash=document.getElementById('splashScreen');const app=document.getElementById('app');let splashSoundPlayed=false;const triggerSplashHit=()=>{if(splashSoundPlayed)return;splashSoundPlayed=true;playSplashHitSound();if(navigator.vibrate)navigator.vibrate(70);};setTimeout(triggerSplashHit,780);document.addEventListener('touchstart',triggerSplashHit,{once:true});document.addEventListener('click',triggerSplashHit,{once:true});setTimeout(()=>{if(splash)splash.style.display='none';if(app)app.style.display='block';render();if(activeTask())autoSendMacroDroidForActiveTask();else clearMacroDroidState();},2200);});
setInterval(()=>{accountStarredWorkAndPenalties();refreshLive();},1000);
</script>
