<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#bfe7ff" />
  <title>Kartavya</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{
      --text:#f5f1e8;
      --muted:#c7bfae;
      --success:#22c55e;
      --danger:#ef4444;
      --soft-green:rgba(34,197,94,.16);
      --soft-green-border:rgba(34,197,94,.30);
      --soft-blue:rgba(59,130,246,.16);
      --soft-blue-border:rgba(96,165,250,.30);
      --gold:#f4b400;
      --gold-deep:#c88d00;
      --gold-soft:#ffd76a;
      --shadow:0 22px 54px rgba(0,0,0,.28);
      --shadow-soft:0 10px 24px rgba(0,0,0,.18);
      --radius-xl:26px;
      --queued-title:#dcecff;
      --routine-title:#e3ffeb;
      --store-title:#fff1c9;
      --queue-blue-1:#2563eb;
      --queue-blue-2:#3b82f6;
      --drag-light:rgba(255,255,255,.14);
      --drag-light-border:rgba(255,255,255,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,.35), transparent 18%),
        linear-gradient(180deg,#dff4ff,#cfeeff 48%,#bfe7ff);
      background-attachment:fixed;
    }

    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      padding:12px 12px 18px;
      display:none;
    }

    .card{
      background:linear-gradient(180deg,rgba(28,28,28,.90),rgba(18,18,18,.88));
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(220,240,255,.35);
      border-radius:var(--radius-xl);
      padding:12px;
      box-shadow:var(--shadow);
      margin-bottom:10px;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));
      pointer-events:none;
    }

    .space{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    .title{
      font-size:26px;
      font-weight:800;
      letter-spacing:-.03em;
      color:#fff7dc;
      text-shadow:0 1px 10px rgba(244,180,0,.08)
    }
    .sub{font-size:18px;font-weight:800;letter-spacing:-.02em;color:#fff5d7}

    .section-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
    .section-dot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));
      box-shadow:0 0 0 5px rgba(244,180,0,.10),0 0 18px rgba(244,180,0,.26);
      flex:0 0 auto
    }

    .small{font-size:12px;color:var(--muted)}
    .pill{padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;box-shadow:var(--shadow-soft)}
    .green-pill{
      background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(34,197,94,.08));
      color:#d8ffe6;
      border:1px solid rgba(34,197,94,.24);
    }

    .logo-wrap{
      width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;
      background:linear-gradient(135deg,rgba(244,180,0,.22),rgba(244,180,0,.06));
      box-shadow:inset 0 0 0 1px rgba(244,180,0,.28),0 6px 16px rgba(244,180,0,.18);
      flex:0 0 auto
    }
    .logo{font-size:18px}

    .current-cycle-dot{
      width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:8px;
      animation:cycleTraffic 1.35s infinite;
      box-shadow:0 0 0 4px rgba(244,180,0,.10)
    }

    .status-dot{
      width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;flex:0 0 auto
    }
    .status-dot.red{background:var(--danger);animation:blink 1s infinite;box-shadow:0 0 0 4px rgba(239,68,68,.12)}
    .status-dot.green{background:var(--success);box-shadow:0 0 0 4px rgba(34,197,94,.12)}

    @keyframes blink{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.3;transform:scale(.9)}
    }

    @keyframes cycleTraffic{
      0%,24%{background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,.12)}
      25%,49%{background:#f4b400; box-shadow:0 0 0 4px rgba(244,180,0,.12)}
      50%,74%{background:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,.12)}
      75%,100%{background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,.12)}
    }

    @keyframes pulse-danger{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.12)}}
    @keyframes pulse-warning{0%,100%{box-shadow:0 0 0 rgba(244,180,0,0)}50%{box-shadow:0 0 0 7px rgba(244,180,0,.10)}}
    @keyframes pulse-safe{0%,100%{box-shadow:0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.08)}}
    @keyframes splashFade{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
    @keyframes targetGlow{0%,100%{box-shadow:0 0 0 0 rgba(244,180,0,.08)}50%{box-shadow:0 0 28px 8px rgba(244,180,0,.22)}}
    @keyframes bullImpact{
      0%,60%{box-shadow:0 0 0 0 rgba(244,180,0,0);transform:scale(1)}
      75%{box-shadow:0 0 0 12px rgba(244,180,0,.22), 0 0 24px rgba(244,180,0,.42);transform:scale(1.22)}
      100%{box-shadow:0 0 0 5px rgba(244,180,0,.14), 0 0 12px rgba(244,180,0,.24);transform:scale(1)}
    }
    @keyframes arrowHitExact{
      0%{opacity:0;transform:translate(34px,-34px) scale(.92)}
      18%{opacity:1}
      70%{opacity:1;transform:translate(0,0) scale(1)}
      82%{opacity:1;transform:translate(-2px,2px) scale(1.03)}
      100%{opacity:1;transform:translate(0,0) scale(1)}
    }

    label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--muted)}

    input{
      width:100%;padding:12px;border-radius:14px;border:1px solid rgba(244,180,0,.18);
      font-size:15px;outline:none;background:rgba(255,255,255,.10);color:#fff7e6;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.20)
    }
    input::placeholder{color:#c9b78c}
    input:focus{border-color:rgba(244,180,0,.38);box-shadow:0 0 0 4px rgba(244,180,0,.08)}

    #taskNameInput,#storeTaskInput,#routineTaskInput{
      background:var(--soft-green);border:1px solid var(--soft-green-border)
    }
    .duration-input{
      padding:12px;border-radius:14px;border:1px solid var(--soft-blue-border);
      font-size:15px;background:var(--soft-blue)
    }

    button{
      width:100%;padding:11px 12px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;border:none;
      transition:transform .12s ease, opacity .12s ease, box-shadow .15s ease, filter .15s ease
    }
    button:hover{filter:brightness(1.04)}
    button:active{transform:scale(.98)}

    .btn-primary{
      background:linear-gradient(135deg,#171717,#2a2a2a);color:#fff8e1;
      border:1px solid rgba(244,180,0,.14);box-shadow:0 8px 20px rgba(0,0,0,.28)
    }
    .btn-gold{
      background:linear-gradient(135deg,var(--gold-soft),var(--gold),var(--gold-deep));
      color:#16120a;box-shadow:0 8px 22px rgba(244,180,0,.28)
    }
    .btn-outline{
      background:rgba(255,255,255,.09);color:#fff3d2;border:1px solid rgba(244,180,0,.14);box-shadow:var(--shadow-soft)
    }
    .btn-success{
      background:linear-gradient(135deg,#16a34a,#22c55e);color:#ffffff;
      border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(34,197,94,.24)
    }
    .btn-danger{
      background:linear-gradient(135deg,#dc2626,#ef4444);color:#ffffff;
      border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(239,68,68,.24)
    }
    .btn-queue{
      background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));
      color:#ffffff;
      border:2px solid rgba(255,255,255,.10);
      box-shadow:0 10px 22px rgba(37,99,235,.22)
    }
    .btn-delete{
      background:linear-gradient(135deg,#dc2626,#ef4444);
      color:#ffffff;
      border:2px solid rgba(255,255,255,.10);
      box-shadow:0 10px 22px rgba(239,68,68,.22)
    }
    .drag-handle{
      width:auto;
      padding:6px 10px;
      border-radius:10px;
      font-size:15px;
      line-height:1;
      font-weight:800;
      color:#eef4ff;
      background:var(--drag-light);
      border:1px solid var(--drag-light-border);
      box-shadow:var(--shadow-soft);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
      flex:0 0 auto;
    }
    .drag-handle:active{cursor:grabbing;transform:scale(.98)}

    .mini{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;white-space:nowrap;flex:0 0 auto}
    .tiny-btn{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;font-weight:800}
    .mini-copy{
      background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));
      color:#fff;
      border:2px solid rgba(255,255,255,.10);
      box-shadow:0 10px 22px rgba(37,99,235,.22)
    }
    .mini-distraction{
      background:linear-gradient(135deg,#b91c1c,#ef4444);
      color:#fff;
      border:2px solid rgba(255,255,255,.10);
      box-shadow:0 10px 22px rgba(239,68,68,.22)
    }
    .distraction-row{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      margin-top:8px;
      margin-bottom:2px;
      flex-wrap:wrap;
    }
    .distraction-label{
      font-size:12px;
      font-weight:800;
      color:#ffd6d6;
    }

    .action-buttons{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px
    }
    .action-buttons button{
      padding:10px 8px;min-height:44px;border-radius:14px;font-size:13px;line-height:1.15;
      letter-spacing:.01em;text-shadow:0 1px 2px rgba(0,0,0,.18)
    }

    .bar-wrap{
      position:relative;width:100%;height:34px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);
      margin-top:8px;display:flex;border:1px solid rgba(244,180,0,.14);box-shadow:inset 0 1px 4px rgba(0,0,0,.20)
    }
    .bar-done{background:linear-gradient(90deg,#ff5a5a,#ff8080);height:100%;transition:width .5s ease}
    .bar-left{background:linear-gradient(90deg,#16a34a,#22c55e);height:100%;transition:width .5s ease}
    .bar-label{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.50);pointer-events:none;letter-spacing:.02em
    }

    .performance-wrap{margin-top:10px}
    .performance-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .perf-box{
      border-radius:18px;padding:10px 8px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;
      border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-soft)
    }
    .perf-box h4{margin:0;font-size:11px;line-height:1.15;font-weight:800;color:#d7c6a0}
    .perf-box .val{font-size:18px;font-weight:800;line-height:1.1;word-break:break-word}
    .perf-reward{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.08))}
    .perf-penalty{background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.08))}
    .perf-wallet{background:linear-gradient(135deg,rgba(244,180,0,.18),rgba(244,180,0,.08))}

    .paired-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-top:10px}
    .paired-box{
      border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:10px;background:rgba(255,255,255,.06);
      box-shadow:var(--shadow-soft);min-width:0
    }

    .quick-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:8px}
    .quick-row .btn-outline{
      background:rgba(255,255,255,.08);border:1px solid rgba(244,180,0,.14);padding:9px 6px;font-size:11px;border-radius:12px
    }

    .list-title{font-size:17px;font-weight:800;margin:0 0 8px 0;color:#fff5d7}

    .queued-panel,
    .routine-panel,
    .store-panel{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.03), transparent 32%),
        linear-gradient(180deg,rgba(28,28,28,.90),rgba(18,18,18,.88));
      box-shadow:var(--shadow);
    }

    .queued-panel{
      border:1px solid rgba(120,190,255,.34);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 14px 34px rgba(96,165,250,.12);
    }
    .queued-panel .list-title{color:var(--queued-title)}
    .queued-panel .section-dot{
      background:linear-gradient(135deg,#93c5fd,#3b82f6);
      box-shadow:0 0 0 5px rgba(96,165,250,.10),0 0 18px rgba(96,165,250,.24);
    }

    .routine-panel{
      border:1px solid rgba(98,235,146,.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 14px 34px rgba(34,197,94,.12);
    }
    .routine-panel .list-title{color:var(--routine-title)}
    .routine-panel .section-dot{
      background:linear-gradient(135deg,#86efac,#22c55e);
      box-shadow:0 0 0 5px rgba(34,197,94,.10),0 0 18px rgba(34,197,94,.24);
    }

    .store-panel{
      border:1px solid rgba(255,220,108,.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 14px 34px rgba(244,180,0,.12);
    }
    .store-panel .list-title{color:var(--store-title)}
    .store-panel .section-dot{
      background:linear-gradient(135deg,#ffe08a,#f4b400);
      box-shadow:0 0 0 5px rgba(244,180,0,.10),0 0 18px rgba(244,180,0,.24);
    }

    .draggable-item{
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:8px 9px;
      margin-top:7px;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      box-shadow:0 6px 14px rgba(0,0,0,.14)
    }
    .draggable-item.active{
      background:linear-gradient(135deg,rgba(34,197,94,.20),rgba(34,197,94,.10));
      border-color:rgba(34,197,94,.28)
    }
    .draggable-item.over{
      outline:2px dashed rgba(147,197,253,.75);
      outline-offset:2px;
    }
    .draggable-item.drag-source{opacity:.65}

    .queue-row,.routine-row,.store-row{
      display:grid;
      align-items:center;
      gap:8px;
    }
    .queue-row{grid-template-columns:minmax(0,1fr) auto auto auto}
    .routine-row{grid-template-columns:minmax(0,1fr) auto auto auto}
    .store-row{grid-template-columns:minmax(0,1fr) auto auto auto}

    .item-name{
      font-weight:800;line-height:1.22;font-size:13px;word-break:break-word;color:#fff8e9;min-width:0;
    }
    .item-meta{font-size:11px;color:#c9b78c;margin-top:5px;font-weight:700;line-height:1.2}

    .top-card{
      border:1px solid rgba(220,240,255,.35);
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,var(--shadow);
    }
    .top-card.safe{animation:pulse-safe 2.2s infinite}
    .top-card.warning{animation:pulse-warning 1.4s infinite}
    .top-card.danger{animation:pulse-danger 1s infinite}

    .task-meta{
      margin-top:8px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
      font-size:13px;font-weight:800;color:#c9b78c
    }
    .empty-state{font-size:12px;font-weight:700;padding:8px 2px}

    .splash{
      position:fixed;inset:0;z-index:9999;
      background:
        radial-gradient(circle at top, rgba(244,180,0,.14), transparent 28%),
        linear-gradient(180deg,#080808,#111111);
      color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;animation:splashFade .9s ease
    }
    .splash-logo{
      width:116px;height:116px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;
      margin-bottom:22px;animation:targetGlow 1.8s ease-in-out infinite
    }
    .splash-target{position:relative;width:116px;height:116px;border-radius:50%}
    .ring1,.ring2,.ring3,.bull{
      position:absolute;inset:0;margin:auto;border-radius:50%;
      border:4px solid var(--gold)
    }
    .ring1{width:112px;height:112px}
    .ring2{width:74px;height:74px}
    .ring3{width:38px;height:38px}
    .bull{
      width:14px;height:14px;border:none;background:var(--gold);
      box-shadow:0 0 0 0 rgba(244,180,0,0);
      animation:bullImpact 1.25s ease-out forwards;
    }

    .arrow-svg{
      position:absolute;inset:0;width:116px;height:116px;z-index:8;overflow:visible;pointer-events:none
    }
    .arrow-line{
      stroke:#ffffff;stroke-width:6;stroke-linecap:round;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.28))
    }
    .arrow-head{
      fill:#ffffff;filter:drop-shadow(0 0 6px rgba(255,255,255,.28))
    }
    .arrow-group{
      opacity:0;transform:translate(18px,-18px);
      animation:arrowHitExact 1.2s ease-out forwards;transform-origin:58px 58px
    }

    .splash-title{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
    .splash-tagline{font-size:19px;font-weight:700;color:var(--gold-soft);margin-bottom:18px}
    .splash-sub{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.03em}

    @media (max-width:380px){
      .app{padding:10px 10px 16px}
      .title{font-size:23px}
      .sub{font-size:16px}
      .bar-wrap{height:32px}
      .bar-label{font-size:13px}
      .action-buttons button{font-size:11px;padding:9px 6px}
      .perf-box .val{font-size:16px}
      .list-title{font-size:15px}
      .mini,.drag-handle{font-size:10px;padding:5px 7px}
      .quick-row .btn-outline{font-size:10px}
      .queue-row{grid-template-columns:minmax(0,1fr) auto auto auto;gap:6px}
      .routine-row{grid-template-columns:minmax(0,1fr) auto auto auto;gap:6px}
      .store-row{grid-template-columns:minmax(0,1fr) auto auto auto;gap:6px}
    }
  </style>
</head>
<body>
  <div class="splash" id="splashScreen">
    <div class="splash-logo">
      <div class="splash-target">
        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>
        <div class="bull"></div>
        <svg class="arrow-svg" viewBox="0 0 116 116" aria-hidden="true">
          <g class="arrow-group">
            <line x1="104" y1="12" x2="58" y2="58" class="arrow-line"></line>
            <polygon points="58,58 68,54 62,48" class="arrow-head"></polygon>
          </g>
        </svg>
      </div>
    </div>
    <div class="splash-title">Kartavya</div>
    <div class="splash-tagline">Discipline is Wealth</div>
    <div class="splash-sub">KARTAVYA DISCIPLINE SYSTEM</div>
  </div>

  <div class="app" id="app"></div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(reg=>reg.unregister());
  });
}

const STORAGE_KEY='kartavya-main-data';
const TOPUP=5000;
const DEFAULT_WALLET=5000;
const DEFAULT_REWARD=50;
const DEFAULT_PENALTY=200;
const DEFAULT_DURATION=30;
const DISTRACTION_PENALTY=50;
const MACRODROID_WEBHOOK_URL='https://trigger.macrodroid.com/9d8de64f-05db-49f9-9470-18e7f06404e1/kartavya_timer';

const state={
  wallet:DEFAULT_WALLET,
  taskName:'',
  reward:String(DEFAULT_REWARD),
  penalty:String(DEFAULT_PENALTY),
  durationMinutes:DEFAULT_DURATION,
  durationText:'30 min',
  storeDurationText:'30 min',
  tasks:[],
  taskStore:[],
  routineTasks:[],
  history:[],
  activeTaskId:null,
  queuePausedAfterFail:false,
  soundEnabled:true,
  vibrationEnabled:true,
  warned10MinTaskId:null,
  warned5MinTaskId:null,
  refillSourceNext:'store',
  lastRoutineResetDate:null,
  showRoutineList:false,
  showStoreList:false,
  distractionPenaltyTotal:0
};

const dragState={list:null,id:null,overId:null};

function sanitizeNumber(value, fallback){
  const n = Number(value);
  return Number.isFinite(n) && n >= 0 ? n : fallback;
}
function escapeHtml(str){
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function rupee(n){return '₹'+Number(n||0).toLocaleString('en-IN')}
function todayKey(){
  const now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}
function formatDuration(mins){
  mins = Math.max(0, Math.round(Number(mins) || 0));
  if(mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return m === 0 ? h + ' hr' : h + ' hr ' + m + ' min';
}
function formatTimeLeftDisplay(seconds){
  seconds = Math.max(0, Math.floor(Number(seconds) || 0));
  const mins = Math.floor(seconds / 60);
  if(mins < 60) return 'Time left ' + mins + ' min';
  const hours = Math.floor(mins / 60), rem = mins % 60;
  return 'Time left ' + hours + ' hr ' + rem + ' min';
}
function parseDurationToMinutes(text){
  if(typeof text !== 'string') return null;
  const raw = text.trim().toLowerCase();
  if(!raw) return null;
  let total = 0, matched = false;
  const hrMatch = raw.match(/(\d+(?:\.\d+)?)\s*(hr|hrs|hour|hours|h)\b/);
  const minMatch = raw.match(/(\d+)\s*(min|mins|minute|minutes|m)\b/);
  if(hrMatch){ total += Math.round(parseFloat(hrMatch[1]) * 60); matched = true; }
  if(minMatch){ total += parseInt(minMatch[1], 10); matched = true; }
  if(matched && total > 0) return total;
  if(/^\d+$/.test(raw)) return parseInt(raw,10);
  return null;
}
function normalizeDurationInput(text){
  const mins = parseDurationToMinutes(text);
  if(mins === null || mins <= 0) return null;
  return { minutes: mins, text: formatDuration(mins) };
}
function toggleRoutineList(){
  state.showRoutineList = !state.showRoutineList;
  save();
  render();
}
function toggleStoreList(){
  state.showStoreList = !state.showStoreList;
  save();
  render();
}

function sendMacroDroidState(taskName, reminderEpoch, taskState, successMessage='', silent=false){
  if(!MACRODROID_WEBHOOK_URL || MACRODROID_WEBHOOK_URL.includes('PASTE_YOUR_MACRODROID_WEBHOOK_URL_HERE')){
    if(!silent) alert('Please paste your MacroDroid webhook URL in the HTML file first.');
    return Promise.resolve(false);
  }

  const separator = MACRODROID_WEBHOOK_URL.includes('?') ? '&' : '?';
  const url =
    MACRODROID_WEBHOOK_URL +
    separator +
    'task_name=' + encodeURIComponent(taskName || '') +
    '&reminder_epoch=' + encodeURIComponent(Math.max(0, Math.round(Number(reminderEpoch) || 0))) +
    '&task_state=' + encodeURIComponent(taskState || 'none');

  return fetch(url, { method:'GET', mode:'no-cors' })
    .then(() => {
      if(!silent && successMessage) alert(successMessage);
      return true;
    })
    .catch(() => {
      if(!silent) alert('Could not contact MacroDroid. Check internet and webhook URL.');
      return false;
    });
}

function clearMacroDroidState(){
  return sendMacroDroidState('', 0, 'none', '', true);
}

function autoSendMacroDroidForActiveTask(){
  const a = activeTask();

  if(!a || !a.deadline){
    return clearMacroDroidState();
  }

  if(a.macroStateSentForTaskId === a.id) return;

  const reminderEpoch = Math.max(0, new Date(a.deadline).getTime() - 5*60*1000);

  sendMacroDroidState(a.taskName, reminderEpoch, 'active', '', true).then(ok => {
    if(ok){
      a.macroStateSentForTaskId = a.id;
      save();
    }
  });
}

function load(){
  const legacyKeys = [
    'kartavya-main-data',
    'kartavya-duration-based-v26',
    'kartavya-duration-based-v25',
    'kartavya-duration-based-v24',
    'kartavya-duration-based-v23',
    'kartavya-duration-based-v22',
    'kartavya-duration-based-v21',
    'kartavya-duration-based-v20',
    'kartavya-duration-based-v19'
  ];
  let loaded = false;

  for(const key of legacyKeys){
    const raw = localStorage.getItem(key);
    if(raw){
      try{
        Object.assign(state, JSON.parse(raw));
        loaded = true;
        if(key !== STORAGE_KEY){
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        break;
      }catch(e){}
    }
  }

  if(!loaded) save();

  state.wallet = sanitizeNumber(state.wallet, DEFAULT_WALLET);
  state.reward = String(sanitizeNumber(state.reward, DEFAULT_REWARD));
  state.penalty = String(sanitizeNumber(state.penalty, DEFAULT_PENALTY));
  state.durationMinutes = Math.max(1, sanitizeNumber(state.durationMinutes, DEFAULT_DURATION));
  state.refillSourceNext = state.refillSourceNext === 'routine' ? 'routine' : 'store';
  if(typeof state.queuePausedAfterFail !== 'boolean') state.queuePausedAfterFail = false;
  if(typeof state.showRoutineList !== 'boolean') state.showRoutineList = false;
  if(typeof state.showStoreList !== 'boolean') state.showStoreList = false;
  state.distractionPenaltyTotal = sanitizeNumber(state.distractionPenaltyTotal, 0);

  const normalized = normalizeDurationInput(state.durationText || formatDuration(state.durationMinutes));
  state.durationText = normalized ? normalized.text : formatDuration(state.durationMinutes);
  state.durationMinutes = normalized ? normalized.minutes : state.durationMinutes;

  const storeNormalized = normalizeDurationInput(state.storeDurationText || '30 min');
  state.storeDurationText = storeNormalized ? storeNormalized.text : '30 min';

  if(!Array.isArray(state.tasks)) state.tasks = [];
  if(!Array.isArray(state.taskStore)) state.taskStore = [];
  if(!Array.isArray(state.routineTasks)) state.routineTasks = [];
  if(!Array.isArray(state.history)) state.history = [];
  if(typeof state.taskName !== 'string') state.taskName = '';

  state.soundEnabled = true;
  state.vibrationEnabled = true;

  migrateTasks();
  migrateTaskStore();
  migrateRoutineTasks();
  resetRoutineTasksIfNewDay();
  syncActive();
}

function activateTask(task){
  if(!task) return;
  if(task.activatedAt && task.deadline) return;
  const now = new Date();
  const durationMinutes = Math.max(1, sanitizeNumber(task.durationMinutes, DEFAULT_DURATION));
  task.durationMinutes = durationMinutes;
  task.durationText = formatDuration(durationMinutes);
  task.activatedAt = now.toISOString();
  task.deadline = new Date(now.getTime() + durationMinutes*60000).toISOString();
  task.macroStateSentForTaskId = null;
  task.autoReminderSent = false;
  state.warned10MinTaskId = null;
  state.warned5MinTaskId = null;
}

function migrateTasks(){
  state.tasks = state.tasks.map((task, index) => {
    if(typeof task.taskName !== 'string') task.taskName = 'Task';
    task.reward = sanitizeNumber(task.reward, DEFAULT_REWARD);
    task.penalty = sanitizeNumber(task.penalty, DEFAULT_PENALTY);
    task.durationMinutes = Math.max(1, sanitizeNumber(task.durationMinutes, DEFAULT_DURATION));
    task.durationText = formatDuration(task.durationMinutes);
    if(typeof task.autoReminderSent !== 'boolean') task.autoReminderSent = false;
    if(typeof task.macroStateSentForTaskId === 'undefined') task.macroStateSentForTaskId = null;
    if(index !== 0 && !task.activatedAt){ delete task.deadline; delete task.activatedAt; }
    return task;
  });
}

function migrateTaskStore(){
  state.taskStore = state.taskStore.map((item, idx) => ({
    id: item && item.id ? item.id : Date.now() + idx,
    taskName: item && typeof item.taskName === 'string' && item.taskName.trim() ? item.taskName.trim() : 'Stored Task',
    durationMinutes: Math.max(1, sanitizeNumber(item && item.durationMinutes, DEFAULT_DURATION)),
    completed: !!(item && item.completed),
    autoServed: !!(item && item.autoServed),
    createdAt: item && item.createdAt ? item.createdAt : new Date().toISOString()
  }));
}

function migrateRoutineTasks(){
  state.routineTasks = state.routineTasks.map((item, idx) => ({
    id: item && item.id ? item.id : Date.now() + idx + 10000,
    taskName: item && typeof item.taskName === 'string' && item.taskName.trim() ? item.taskName.trim() : 'Routine Task',
    durationMinutes: Math.max(1, sanitizeNumber(item && item.durationMinutes, DEFAULT_DURATION)),
    completed: !!(item && item.completed),
    autoServed: !!(item && item.autoServed),
    createdAt: item && item.createdAt ? item.createdAt : new Date().toISOString()
  }));
}

function resetRoutineTasksIfNewDay(){
  const today = todayKey();
  if(state.lastRoutineResetDate !== today){
    state.routineTasks = state.routineTasks.map(item => ({
      ...item,
      completed:false,
      autoServed:false
    }));
    state.lastRoutineResetDate = today;
    save();
  }
}

function secondsLeft(d){return Math.max(0,Math.floor((new Date(d)-new Date())/1000))}
function activeTask(){
  if(!state.activeTaskId) return null;
  return state.tasks.find(x=>x.id===state.activeTaskId) || null;
}
function syncActive(){
  if(!state.tasks.length){
    state.activeTaskId = null;
    state.queuePausedAfterFail = false;
    state.warned10MinTaskId = null;
    state.warned5MinTaskId = null;
    save();
    return;
  }

  if(state.queuePausedAfterFail && !state.activeTaskId){
    save();
    return;
  }

  const exists = state.tasks.some(x=>x.id===state.activeTaskId);
  if(!exists){
    state.activeTaskId = state.tasks[0].id;
  }

  activateTask(activeTask());
  save();
}

function alarm(type='normal'){
  if(state.soundEnabled){
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=type==='danger'?220:660;
      gain.gain.value=.04;
      osc.start(); osc.stop(ctx.currentTime+.22);
    }catch(e){}
  }
  if(state.vibrationEnabled && navigator.vibrate){
    navigator.vibrate(type==='danger'?[250,120,250]:[120,60,120]);
  }
}

function playSplashHitSound(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;

    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    master.connect(ctx.destination);

    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const osc3 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    const gain2 = ctx.createGain();
    const gain3 = ctx.createGain();

    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc3.type = 'sine';

    osc1.frequency.setValueAtTime(1800, now);
    osc1.frequency.exponentialRampToValueAtTime(620, now + 0.20);
    osc2.frequency.setValueAtTime(2400, now);
    osc2.frequency.exponentialRampToValueAtTime(900, now + 0.16);
    osc3.frequency.setValueAtTime(950, now);
    osc3.frequency.exponentialRampToValueAtTime(420, now + 0.22);

    gain1.gain.setValueAtTime(0.9, now);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    gain2.gain.setValueAtTime(0.55, now);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
    gain3.gain.setValueAtTime(0.35, now);
    gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

    osc1.connect(gain1); osc2.connect(gain2); osc3.connect(gain3);
    gain1.connect(master); gain2.connect(master); gain3.connect(master);

    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for(let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }

    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.setValueAtTime(1800, now);
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.18, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(master);

    osc1.start(now); osc2.start(now); osc3.start(now); noise.start(now);
    osc1.stop(now + 0.20); osc2.stop(now + 0.16); osc3.stop(now + 0.22); noise.stop(now + 0.05);
  }catch(e){}
}

function buildTask(taskName, durationMinutes, sourceType='', sourceId=null){
  return {
    id: Date.now() + Math.floor(Math.random()*1000),
    taskName: taskName.trim(),
    reward: sanitizeNumber(state.reward, DEFAULT_REWARD),
    penalty: sanitizeNumber(state.penalty, DEFAULT_PENALTY),
    durationMinutes,
    durationText: formatDuration(durationMinutes),
    createdAt: new Date().toISOString(),
    sourceType,
    sourceId,
    autoReminderSent:false,
    macroStateSentForTaskId:null
  };
}

function createTask(){
  if(state.queuePausedAfterFail && state.tasks.length){
    startNextTask();
    return;
  }

  if(!state.taskName.trim()) return alert('Enter task name.');
  const normalized = normalizeDurationInput(state.durationText);
  if(!normalized) return alert('Enter duration like 30 min, 1 hr, or 1 hr 30 min.');
  state.durationMinutes = normalized.minutes;
  state.durationText = normalized.text;

  const task = buildTask(state.taskName, normalized.minutes, 'manual', null);
  state.tasks.push(task);
  state.queuePausedAfterFail = false;

  if(!state.activeTaskId){
    state.activeTaskId = task.id;
  }

  state.taskName='';
  state.durationMinutes=DEFAULT_DURATION;
  state.durationText=formatDuration(DEFAULT_DURATION);
  syncActive(); save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function startNextTask(){
  if(!state.tasks.length) return;
  state.queuePausedAfterFail = false;
  state.activeTaskId = state.tasks[0].id;
  syncActive();
  render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function reorderByIds(arr, draggedId, targetId){
  const from = arr.findIndex(x => x.id === draggedId);
  const to = arr.findIndex(x => x.id === targetId);
  if(from === -1 || to === -1 || from === to) return arr;
  const copy = [...arr];
  const [moved] = copy.splice(from, 1);
  copy.splice(to, 0, moved);
  return copy;
}
function reorderList(listKey, draggedId, targetId){
  if(!draggedId || !targetId || draggedId === targetId) return;
  state[listKey] = reorderByIds(state[listKey], draggedId, targetId);
  save();
  render();
}
function clearDragClasses(){
  document.querySelectorAll('.draggable-item').forEach(el=>{
    el.classList.remove('over','drag-source');
  });
}
function bindDragAndDrop(){
  const handles = document.querySelectorAll('[data-drag-handle]');
  const rows = document.querySelectorAll('.draggable-item');

  rows.forEach(row=>{
    row.addEventListener('dragover', e=>{
      if(!dragState.list) return;
      const list = row.getAttribute('data-list');
      if(list !== dragState.list) return;
      e.preventDefault();
      clearDragClasses();
      row.classList.add('over');
      dragState.overId = Number(row.getAttribute('data-id'));
      const source = document.querySelector(`.draggable-item[data-list="${dragState.list}"][data-id="${dragState.id}"]`);
      if(source) source.classList.add('drag-source');
    });

    row.addEventListener('drop', e=>{
      e.preventDefault();
      const list = row.getAttribute('data-list');
      const targetId = Number(row.getAttribute('data-id'));
      if(list === dragState.list){
        const map = { queue:'tasks', routine:'routineTasks', store:'taskStore' };
        reorderList(map[list], dragState.id, targetId);
      }
      dragState.list = null;
      dragState.id = null;
      dragState.overId = null;
      clearDragClasses();
    });

    row.addEventListener('dragend', ()=>{
      dragState.list = null;
      dragState.id = null;
      dragState.overId = null;
      clearDragClasses();
    });
  });

  handles.forEach(handle=>{
    handle.addEventListener('dragstart', e=>{
      dragState.list = handle.getAttribute('data-list');
      dragState.id = Number(handle.getAttribute('data-id'));
      dragState.overId = null;
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(dragState.id));
      }
      const source = document.querySelector(`.draggable-item[data-list="${dragState.list}"][data-id="${dragState.id}"]`);
      if(source) source.classList.add('drag-source');
    });

    handle.addEventListener('touchstart', ()=>{
      dragState.list = handle.getAttribute('data-list');
      dragState.id = Number(handle.getAttribute('data-id'));
      dragState.overId = null;
      clearDragClasses();
      const source = document.querySelector(`.draggable-item[data-list="${dragState.list}"][data-id="${dragState.id}"]`);
      if(source) source.classList.add('drag-source');
    }, {passive:true});

    handle.addEventListener('touchmove', e=>{
      if(!dragState.list) return;
      const touch = e.touches[0];
      if(!touch) return;
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const row = el && el.closest('.draggable-item');
      clearDragClasses();
      const source = document.querySelector(`.draggable-item[data-list="${dragState.list}"][data-id="${dragState.id}"]`);
      if(source) source.classList.add('drag-source');

      if(row && row.getAttribute('data-list') === dragState.list){
        row.classList.add('over');
        dragState.overId = Number(row.getAttribute('data-id'));
      }
    }, {passive:true});

    handle.addEventListener('touchend', ()=>{
      if(dragState.list && dragState.overId && dragState.overId !== dragState.id){
        const map = { queue:'tasks', routine:'routineTasks', store:'taskStore' };
        reorderList(map[dragState.list], dragState.id, dragState.overId);
      }
      dragState.list = null;
      dragState.id = null;
      dragState.overId = null;
      clearDragClasses();
    });

    handle.addEventListener('touchcancel', ()=>{
      dragState.list = null;
      dragState.id = null;
      dragState.overId = null;
      clearDragClasses();
    });
  });
}

function copyQueuedTask(id){
  const index = state.tasks.findIndex(x => x.id === id);
  if(index === -1) return;
  const src = state.tasks[index];
  const copy = {
    ...src,
    id: Date.now() + Math.floor(Math.random()*1000),
    createdAt: new Date().toISOString(),
    autoReminderSent:false,
    macroStateSentForTaskId:null
  };
  delete copy.activatedAt;
  delete copy.deadline;
  state.tasks.splice(index + 1, 0, copy);
  save();
  render();
}

function addDistractionPenalty(){
  const a = activeTask();
  if(!a) return;
  state.wallet = Math.max(0, state.wallet - DISTRACTION_PENALTY);
  state.distractionPenaltyTotal += DISTRACTION_PENALTY;
  alarm('danger');
  save();
  render();
}

function removeTask(id){
  const wasActive = state.activeTaskId===id;
  state.tasks = state.tasks.filter(x=>x.id!==id);
  if(wasActive) state.activeTaskId=null;
  if(!state.tasks.length) state.queuePausedAfterFail = false;
  syncActive(); save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function markSourceTaskCompleted(task){
  if(!task) return;

  if(task.sourceType === 'store' && task.sourceId){
    state.taskStore = state.taskStore.map(item =>
      item.id === task.sourceId ? {...item, completed:true} : item
    );
  }

  if(task.sourceType === 'routine' && task.sourceId){
    state.routineTasks = state.routineTasks.map(item =>
      item.id === task.sourceId ? {...item, completed:true} : item
    );
  }
}

function nextUnfinishedStoreTask(){
  return state.taskStore.find(item => !item.completed && !item.autoServed) || null;
}
function nextUnfinishedRoutineTask(){
  return state.routineTasks.find(item => !item.completed && !item.autoServed) || null;
}

function enqueueFromSource(){
  if(state.tasks.length > 0) return false;

  const storeItem = nextUnfinishedStoreTask();
  const routineItem = nextUnfinishedRoutineTask();
  if(!storeItem && !routineItem) return false;

  let source = state.refillSourceNext;
  if(source === 'store' && !storeItem) source = 'routine';
  if(source === 'routine' && !routineItem) source = 'store';

  let task = null;

  if(source === 'store' && storeItem){
    task = buildTask(storeItem.taskName, storeItem.durationMinutes, 'store', storeItem.id);
    state.taskStore = state.taskStore.map(item =>
      item.id === storeItem.id ? {...item, autoServed:true} : item
    );
    state.refillSourceNext = 'routine';
  }else if(source === 'routine' && routineItem){
    task = buildTask(
      routineItem.taskName,
      Math.max(1, sanitizeNumber(routineItem.durationMinutes, DEFAULT_DURATION)),
      'routine',
      routineItem.id
    );
    state.routineTasks = state.routineTasks.map(item =>
      item.id === routineItem.id ? {...item, autoServed:true} : item
    );
    state.refillSourceNext = 'store';
  }

  if(!task) return false;
  state.tasks.push(task);
  return true;
}

function finishTask(result){
  const a=activeTask();
  if(!a) return;

  if(result==='success'){
    state.wallet += sanitizeNumber(a.reward, DEFAULT_REWARD);
    markSourceTaskCompleted(a);
    alarm('normal');
  }else{
    state.wallet = Math.max(0, state.wallet - sanitizeNumber(a.penalty, DEFAULT_PENALTY));
    alarm('danger');
  }

  state.history.unshift({...a,result,completedAt:new Date().toISOString()});
  state.tasks = state.tasks.filter(x=>x.id!==a.id);
  state.activeTaskId = null;

  if(state.tasks.length === 0){
    enqueueFromSource();
  }

  state.queuePausedAfterFail = false;
  syncActive(); save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function autoFailIfOverdue(){
  return;
}

function checkDeadlineWarnings(){ return; }

function addTopup(){ state.wallet += TOPUP; save(); render(); }

function resetScore(){
  const ok = confirm('Reset reward, penalty and success record?');
  if(!ok) return;
  state.history = [];
  state.distractionPenaltyTotal = 0;
  state.taskStore = state.taskStore.map(item => ({...item, completed:false, autoServed:false}));
  state.routineTasks = state.routineTasks.map(item => ({...item, completed:false, autoServed:false}));
  state.tasks = state.tasks.map(item => ({...item, autoReminderSent:false, macroStateSentForTaskId:null}));
  save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function addDuration(mins){
  const current = normalizeDurationInput(state.durationText || formatDuration(state.durationMinutes));
  const currentMinutes = current ? current.minutes : DEFAULT_DURATION;
  const updatedMinutes = Math.max(1, currentMinutes + mins);
  state.durationMinutes = updatedMinutes;
  state.durationText = formatDuration(updatedMinutes);
  save(); render();
}

function bindStoreDurationInput(){
  const input = document.getElementById('storeDurationInput');
  if(!input) return;
  input.addEventListener('input',e=>{
    state.storeDurationText = e.target.value;
    save();
  });
  input.addEventListener('blur',e=>{
    const normalized = normalizeDurationInput(e.target.value);
    if(normalized){
      state.storeDurationText = normalized.text;
      e.target.value = normalized.text;
      save();
    }
  });
}

function addTaskForFuture(){
  const input = document.getElementById('storeTaskInput');
  const value = input ? input.value.trim() : '';
  if(!value) return alert('Enter a future task.');

  const normalized = normalizeDurationInput(state.storeDurationText || '30 min');
  if(!normalized) return alert('Enter store duration like 30 min, 45 min, or 1 hr.');

  state.storeDurationText = normalized.text;

  state.taskStore.push({
    id: Date.now() + Math.floor(Math.random()*1000),
    taskName: value,
    durationMinutes: normalized.minutes,
    completed:false,
    autoServed:false,
    createdAt: new Date().toISOString()
  });

  state.storeDurationText = '30 min';
  if(input) input.value = '';

  save(); render();
}

function sendStoreTaskToQueue(id){
  const item = state.taskStore.find(x=>x.id===id);
  if(!item) return;
  const task = buildTask(item.taskName, item.durationMinutes, 'store', item.id);
  state.tasks.push(task);
  state.queuePausedAfterFail = false;
  if(!state.activeTaskId){
    state.activeTaskId = task.id;
  }
  syncActive(); save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function deleteStoreTask(id){
  const item = state.taskStore.find(x=>x.id===id);
  if(!item) return;
  if(!confirm('Delete this task from Task Store?')) return;
  state.taskStore = state.taskStore.filter(x=>x.id!==id);
  save(); render();
}

function addRoutineTask(){
  const nameInput = document.getElementById('routineTaskInput');
  const durInput = document.getElementById('routineDurationInput');
  const taskName = nameInput ? nameInput.value.trim() : '';
  const durationRaw = durInput ? durInput.value.trim() : '';
  if(!taskName) return alert('Enter routine task name.');
  const normalized = normalizeDurationInput(durationRaw || '30 min');
  if(!normalized) return alert('Enter routine duration like 30 min, 45 min, or 1 hr 15 min.');

  state.routineTasks.push({
    id: Date.now() + Math.floor(Math.random()*1000),
    taskName,
    durationMinutes: normalized.minutes,
    completed:false,
    autoServed:false,
    createdAt:new Date().toISOString()
  });
  save(); render();
}

function sendRoutineTaskToQueue(id){
  const item = state.routineTasks.find(x=>x.id===id);
  if(!item) return;
  const task = buildTask(item.taskName, Math.max(1, sanitizeNumber(item.durationMinutes, DEFAULT_DURATION)), 'routine', item.id);
  state.tasks.push(task);
  state.queuePausedAfterFail = false;
  if(!state.activeTaskId){
    state.activeTaskId = task.id;
  }
  syncActive(); save(); render();
  if(activeTask()) autoSendMacroDroidForActiveTask();
  else clearMacroDroidState();
}

function deleteRoutineTask(id){
  const item = state.routineTasks.find(x=>x.id===id);
  if(!item) return;
  if(!confirm('Delete this task from Routine Task?')) return;
  state.routineTasks = state.routineTasks.filter(x=>x.id!==id);
  save(); render();
}

function stats(){
  return{
    reward:state.history.filter(x=>x.result==='success').reduce((a,b)=>a+sanitizeNumber(b.reward,0),0),
    penalty:
      state.history.filter(x=>x.result==='fail').reduce((a,b)=>a+sanitizeNumber(b.penalty,0),0) +
      sanitizeNumber(state.distractionPenaltyTotal,0),
    successCount:state.history.filter(x=>x.result==='success').length,
    total:state.history.length
  };
}
function successPercent(){
  const s=stats();
  return s.total===0 ? 100 : Math.round((s.successCount/s.total)*100);
}
function progressPercent(a){
  if(!a || !a.deadline || !a.activatedAt) return 0;
  const total=Math.max(1,new Date(a.deadline)-new Date(a.activatedAt));
  const used=Math.max(0,new Date()-new Date(a.activatedAt));
  return Math.max(0,Math.min(100,Math.round((used/total)*100)));
}
function urgencyClass(){
  const a=activeTask();
  if(!a || !a.deadline) return 'safe';
  const mins=Math.max(0, Math.floor((new Date(a.deadline)-new Date())/60000));
  if(mins<=5) return 'danger';
  if(mins<=10) return 'warning';
  return 'safe';
}

function bindDurationInput(){
  const durationInput = document.getElementById('durationInput');
  if(!durationInput) return;
  durationInput.addEventListener('input',e=>{ state.durationText = e.target.value; save(); });
  durationInput.addEventListener('blur',e=>{
    const normalized = normalizeDurationInput(e.target.value);
    if(normalized){
      state.durationMinutes = normalized.minutes;
      state.durationText = normalized.text;
      e.target.value = normalized.text;
      save();
    }
  });
}

function refreshLive(){
  resetRoutineTasksIfNewDay();
  const a=activeTask(),
    current=document.getElementById('currentTaskText'),
    clockInline=document.getElementById('timeLeftInline'),
    doneBar=document.getElementById('doneBar'),
    leftBar=document.getElementById('leftBar'),
    percent=document.getElementById('successPercent'),
    topCard=document.getElementById('topCard'),
    activeDuration=document.getElementById('activeDurationText'),
    deadlineStatus=document.getElementById('deadlineStatusText');

  if(percent) percent.textContent = successPercent()+'% Success';

  if(a){
    const overdue = a.deadline && (new Date(a.deadline) - new Date()) <= 0;

    if(topCard){
      topCard.className = 'card top-card ' + (overdue ? 'danger' : urgencyClass());
    }

    if(current) current.innerHTML = '<span class="current-cycle-dot"></span>' + escapeHtml(a.taskName);
    if(clockInline) clockInline.textContent = overdue ? 'Overdue' : formatTimeLeftDisplay(secondsLeft(a.deadline));
    if(activeDuration) activeDuration.textContent = formatDuration(a.durationMinutes || 0);
    if(deadlineStatus) deadlineStatus.textContent = overdue
      ? 'Deadline crossed'
      : ('Ends: ' + new Date(a.deadline).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }));

    const pct = overdue ? 100 : progressPercent(a);
    if(doneBar) doneBar.style.width = pct+'%';
    if(leftBar) leftBar.style.width = (100-pct)+'%';
  }else{
    if(topCard) topCard.className = 'card top-card safe';
    if(current) current.textContent = 'No active task';
    if(clockInline) clockInline.textContent = 'Time left 0 min';
    if(activeDuration) activeDuration.textContent = '--';
    if(deadlineStatus) deadlineStatus.textContent = '';
    if(doneBar) doneBar.style.width='0%';
    if(leftBar) leftBar.style.width='100%';
  }
}

function render(){
  resetRoutineTasksIfNewDay();

  const app=document.getElementById('app'),
    a=activeTask(),
    s=stats(),
    urgency=urgencyClass();

  const shouldShowStartNext = state.queuePausedAfterFail && state.tasks.length > 0;

  const routineToggleText = state.showRoutineList ? 'Hide Routine Tasks' : 'Show Routine Tasks';
  const storeToggleText = state.showStoreList ? 'Hide Stored Tasks' : 'Show Stored Tasks';

  const currentTaskHtml = a ? '<span class="current-cycle-dot"></span>' + escapeHtml(a.taskName) : 'No active task';
  const endText = a && a.deadline

      : 'Ends: ' + new Date(a.deadline).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }))
    : '';

  const timeLeftText = a && a.deadline ? (overdue ? 'Overdue' : formatTimeLeftDisplay(secondsLeft(a.deadline))) : 'Time left 0 min';

    ? state.tasks.map((item, idx)=>{

        return '<div class="draggable-item' + (isActive ? ' active' : '') + '" data-list="queue" data-id="' + item.id + '">' +

    : '<div class="empty-state">No queued task yet.</div>';

  const routineHtml = state.routineTasks.length
    ? state.routineTasks.map((item, idx)=>{
        const dotClass = item.completed ? 'green' : 'red';
        return '<div class="draggable-item" data-list="routine" data-id="' + item.id + '">' +
          '<div class="routine-row">' +
            '<div>' +
              '<div class="item-name"><span class="status-dot ' + dotClass + '"></span>' + (idx+1) + '. ' + escapeHtml(item.taskName) + '</div>' +
              '<div class="item-meta">' + formatDuration(item.durationMinutes) + '</div>' +
            '</div>' +
            '<button class="drag-handle" draggable="true" data-drag-handle="1" data-list="routine" data-id="' + item.id + '">⋮⋮</button>' +
            '<button class="btn-queue mini" data-send-routine="' + item.id + '">Queue</button>' +
            '<button class="btn-delete mini" data-routine-delete="' + item.id + '">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('')
    : '<div class="empty-state">No routine task yet.</div>';

  const storeHtml = state.taskStore.length
    ? state.taskStore.map((item, idx)=>{
        const dotClass = item.completed ? 'green' : 'red';
        return '<div class="draggable-item" data-list="store" data-id="' + item.id + '">' +
          '<div class="store-row">' +
            '<div>' +
              '<div class="item-name"><span class="status-dot ' + dotClass + '"></span>' + (idx+1) + '. ' + escapeHtml(item.taskName) + '</div>' +
              '<div class="item-meta">' + formatDuration(item.durationMinutes) + '</div>' +
            '</div>' +
            '<button class="drag-handle" draggable="true" data-drag-handle="1" data-list="store" data-id="' + item.id + '">⋮⋮</button>' +
            '<button class="btn-queue mini" data-send-queue="' + item.id + '">Queue</button>' +
            '<button class="btn-delete mini" data-store-delete="' + item.id + '">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('')
    : '<div class="empty-state">No future task stored yet.</div>';

  app.innerHTML=`
<div class="card top-card ${overdue ? 'danger' : urgency}" id="topCard">
  <div class="space">
    <div class="row" style="min-width:0;flex:1">
      <div class="title">Kartavya</div>
      <div class="logo-wrap"><div class="logo">🎯</div></div>
      <div id="successPercent" class="small pill green-pill">${successPercent()}% Success</div>
    </div>
    <div style="min-width:0;flex:1;text-align:right">
      <div class="small">Current Task</div>
      <div class="sub" id="currentTaskText" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentTaskHtml}</div>
    </div>
  </div>

  <div class="distraction-row">
    <div class="distraction-label">Distraction</div>
    <button class="mini mini-distraction" id="distractionBtn" ${a ? '' : 'disabled style="opacity:.45;pointer-events:none"'}>-${rupee(DISTRACTION_PENALTY)}</button>
  </div>

  <div class="bar-wrap">
    <div class="bar-done" id="doneBar" style="width:${a?(overdue?100:progressPercent(a)):0}%"></div>
    <div class="bar-left" id="leftBar" style="width:${a?(overdue?0:100-progressPercent(a)):100}%"></div>
    <div class="bar-label" id="timeLeftInline">${timeLeftText}</div>
  </div>

  <div class="task-meta">
    <div>Duration: <span id="activeDurationText">${a ? formatDuration(a.durationMinutes || 0) : '--'}</span></div>
    <div id="deadlineStatusText">${endText}</div>
  </div>

  <div class="action-buttons">
    <button class="btn-success" id="successBtn" ${a ? '' : 'disabled style="opacity:.45;pointer-events:none"'}>${successButtonText}</button>
    <button class="btn-danger" id="failBtn" ${a ? '' : 'disabled style="opacity:.45;pointer-events:none"'}>${failButtonText}</button>
  </div>
</div>

<div class="card">
  <div class="section-head">
    <span class="section-dot"></span>
    <div class="sub">Your Performance</div>
  </div>
  <div class="performance-wrap">
    <div class="performance-grid">
      <div class="perf-box perf-reward">
        <h4>Total Reward</h4>
        <div class="val" style="color:#d8ffe6">${rupee(s.reward)}</div>
      </div>
      <div class="perf-box perf-penalty">
        <h4>Total Penalty</h4>
        <div class="val" style="color:#ffd0d0">${rupee(s.penalty)}</div>
      </div>
      <div class="perf-box perf-wallet">
        <h4>Wallet Balance</h4>
        <div class="val">${rupee(state.wallet)}</div>
        <button class="btn-primary tiny-btn" id="topupBtn">+${rupee(TOPUP)}</button>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="section-head">
    <span class="section-dot"></span>
    <div class="sub">Create New Task</div>
  </div>
  <div class="paired-grid">
    <div class="paired-box">
      <label>Task Name</label>
      <input id="taskNameInput" value="${escapeHtml(state.taskName)}" placeholder="">
      <div style="margin-top:8px">
        <button class="btn-gold" id="createBtn">${createButtonText}</button>
      </div>

</div>

<div class="card queued-panel">

    <span class="section-dot"></span>

      <label>Task Name</label>

  <div class="row" style="margin-top:8px">
    <button class="btn-gold" id="routineAddBtn" style="flex:1">Add Routine Task</button>
    <button class="btn-outline mini" id="toggleRoutineBtn">${routineToggleText}</button>
  </div>
  <div id="routineListWrap" style="margin-top:8px;display:${state.showRoutineList ? 'block' : 'none'}">${routineHtml}</div>
</div>

<div class="card store-panel">
  <div class="section-head">
    <span class="section-dot"></span>
    <div class="list-title">Task Store</div>
  </div>

  <div class="paired-grid">
    <div class="paired-box">
      <label>Future Task</label>
      <input id="storeTaskInput" value="" placeholder="Enter Task">
    </div>

      <label>Duration</label>
      <input id="storeDurationInput" class="duration-input" value="${escapeHtml(state.storeDurationText)}" placeholder="e.g. 30 min">
    </div>
  </div>

  <div class="row" style="margin-top:8px">

  document.getElementById('taskNameInput').addEventListener('input',e=>{ state.taskName=e.target.value; save(); });
  bindDurationInput();
  bindStoreDurationInput();

  document.getElementById('add15Btn').addEventListener('click',()=>addDuration(15));
  document.getElementById('add30Btn').addEventListener('click',()=>addDuration(30));
  document.getElementById('add60Btn').addEventListener('click',()=>addDuration(60));
  document.getElementById('createBtn').addEventListener('click',createTask);
  document.getElementById('topupBtn').addEventListener('click',addTopup);
  document.getElementById('storeAddBtn').addEventListener('click',addTaskForFuture);
  document.getElementById('routineAddBtn').addEventListener('click',addRoutineTask);
  document.getElementById('toggleRoutineBtn').addEventListener('click',toggleRoutineList);
  document.getElementById('toggleStoreBtn').addEventListener('click',toggleStoreList);

  const distractionBtn = document.getElementById('distractionBtn');
  if(distractionBtn) distractionBtn.addEventListener('click',addDistractionPenalty);

  const storeInput=document.getElementById('storeTaskInput');
  if(storeInput) storeInput.addEventListener('keydown',e=>{ if(e.key==='Enter') addTaskForFuture(); });

  const routineInput=document.getElementById('routineTaskInput');
  if(routineInput) routineInput.addEventListener('keydown',e=>{ if(e.key==='Enter') addRoutineTask(); });

  document.getElementById('resetScoreBtn').addEventListener('click',resetScore);

  const successBtn=document.getElementById('successBtn');
  if(successBtn) successBtn.addEventListener('click',()=>finishTask('success'));

  const failBtn=document.getElementById('failBtn');
  if(failBtn) failBtn.addEventListener('click',()=>finishTask('fail'));

  document.querySelectorAll('[data-remove]').forEach(btn=>
    btn.addEventListener('click',()=>removeTask(Number(btn.getAttribute('data-remove'))))
  );
  document.querySelectorAll('[data-copy-queue]').forEach(btn=>
    btn.addEventListener('click',()=>copyQueuedTask(Number(btn.getAttribute('data-copy-queue'))))
  );
  document.querySelectorAll('[data-send-queue]').forEach(btn=>
    btn.addEventListener('click',()=>sendStoreTaskToQueue(Number(btn.getAttribute('data-send-queue'))))
  );
  document.querySelectorAll('[data-store-delete]').forEach(btn=>
    btn.addEventListener('click',()=>deleteStoreTask(Number(btn.getAttribute('data-store-delete'))))
  );
  document.querySelectorAll('[data-send-routine]').forEach(btn=>
    btn.addEventListener('click',()=>sendRoutineTaskToQueue(Number(btn.getAttribute('data-send-routine'))))
  );
  document.querySelectorAll('[data-routine-delete]').forEach(btn=>
    btn.addEventListener('click',()=>deleteRoutineTask(Number(btn.getAttribute('data-routine-delete'))))
  );

  bindDragAndDrop();
}

load();

window.addEventListener('load',()=>{
  const splash=document.getElementById('splashScreen');
  const app=document.getElementById('app');

  let splashSoundPlayed = false;
  const triggerSplashHit = ()=>{
    if(splashSoundPlayed) return;
    splashSoundPlayed = true;
    playSplashHitSound();
    if(navigator.vibrate) navigator.vibrate(70);
  };

  setTimeout(triggerSplashHit, 780);
  document.addEventListener('touchstart', triggerSplashHit, { once:true });
  document.addEventListener('click', triggerSplashHit, { once:true });

  setTimeout(()=>{
    if(splash) splash.style.display='none';
    if(app) app.style.display='block';
    render();
    if(activeTask()) autoSendMacroDroidForActiveTask();
    else clearMacroDroidState();
  },2200);
});

setInterval(()=>{
  autoFailIfOverdue();
  checkDeadlineWarnings();
  refreshLive();
},1000);
</script>
