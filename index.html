<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#bfe7ff">
<title>Kartavya</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --text:#f5f1e8;--muted:#c7bfae;--success:#22c55e;--danger:#ef4444;
  --gold:#f4b400;--gold-deep:#c88d00;--gold-soft:#ffd76a;
  --shadow:0 22px 54px rgba(0,0,0,.28);--shadow-soft:0 10px 24px rgba(0,0,0,.18);
  --radius-xl:26px;--queued-title:#dcecff;--store-title:#fff1c9;
  --queue-blue-1:#2563eb;--queue-blue-2:#3b82f6;--pause:#f59e0b;
  --soft-green:rgba(34,197,94,.16);--soft-green-border:rgba(34,197,94,.30);
  --soft-blue:rgba(59,130,246,.16);--soft-blue-border:rgba(96,165,250,.30)
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);
  background:radial-gradient(circle at top left,rgba(255,255,255,.55),transparent 18%),
  radial-gradient(circle at top right,rgba(255,255,255,.35),transparent 18%),
  linear-gradient(180deg,#dff4ff,#cfeeff 48%,#bfe7ff);
  background-attachment:fixed
}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:12px;display:none}
.card{
  background:linear-gradient(180deg,rgba(28,28,28,.90),rgba(18,18,18,.88));
  border:1px solid rgba(220,240,255,.35);border-radius:var(--radius-xl);
  padding:12px;box-shadow:var(--shadow);margin-bottom:10px;position:relative;overflow:hidden
}
.space{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.title{font-size:26px;font-weight:800;letter-spacing:-.03em;color:#fff7dc}
.sub{font-size:18px;font-weight:800;color:#fff5d7}
.small{font-size:12px;color:var(--muted)}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.section-dot{
  width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));
  box-shadow:0 0 0 5px rgba(244,180,0,.10),0 0 18px rgba(244,180,0,.26);
  flex:0 0 auto
}
.pill{padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;box-shadow:var(--shadow-soft)}
.green-pill{
  background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(34,197,94,.08));
  color:#d8ffe6;border:1px solid rgba(34,197,94,.24)
}
.logo-wrap{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;
  background:linear-gradient(135deg,rgba(244,180,0,.22),rgba(244,180,0,.06));
  box-shadow:inset 0 0 0 1px rgba(244,180,0,.28),0 6px 16px rgba(244,180,0,.18);
  flex:0 0 auto
}
.logo{font-size:18px}
.current-cycle-dot,.paused-cycle-dot{
  width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:8px
}
.current-cycle-dot{animation:cycleTraffic 1.35s infinite}
.paused-cycle-dot{background:var(--pause);box-shadow:0 0 0 4px rgba(245,158,11,.12)}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}
.status-dot.red{background:var(--danger);box-shadow:0 0 0 4px rgba(239,68,68,.12)}
.status-dot.green{background:var(--success);box-shadow:0 0 0 4px rgba(34,197,94,.12)}
.star-item-name,.star-current-gold{color:var(--gold-soft)!important}
.star-current-green{color:#7dff9c!important}
.oldest-required{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.required-check{display:inline-flex;color:#ef4444;font-weight:900;margin-left:4px;font-size:15px;text-decoration:none!important}
.star-rule{font-size:11px;font-weight:800;color:var(--gold-soft);margin-top:4px;text-align:right;white-space:nowrap}
@keyframes cycleTraffic{
  0%,24%{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.12)}
  25%,49%{background:#f4b400;box-shadow:0 0 0 4px rgba(244,180,0,.12)}
  50%,74%{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.12)}
  75%,100%{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.12)}
}
@keyframes pulse-danger{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.12),var(--shadow)}}
@keyframes pulse-warning{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 7px rgba(244,180,0,.10),var(--shadow)}}
@keyframes dotBlink{0%,100%{transform:scale(1);outline-color:rgba(255,255,255,.75)}50%{transform:scale(1.35);outline-color:rgba(244,180,0,.9)}}
label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--muted)}
input{
  width:100%;padding:12px;border-radius:14px;border:1px solid rgba(244,180,0,.18);
  font-size:15px;outline:none;background:rgba(255,255,255,.10);color:#fff7e6;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.20)
}
input::placeholder{color:#c9b78c}
input:focus{border-color:rgba(244,180,0,.38);box-shadow:0 0 0 4px rgba(244,180,0,.08)}
#storeTaskInput{background:var(--soft-green);border:1px solid var(--soft-green-border)}
.duration-input{background:var(--soft-blue);border:1px solid var(--soft-blue-border)}
button{
  width:100%;padding:11px 12px;border-radius:14px;font-size:14px;font-weight:800;
  cursor:pointer;border:none;transition:transform .12s ease,filter .15s ease
}
button:hover{filter:brightness(1.04)}
button:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,#171717,#2a2a2a);color:#fff8e1;border:1px solid rgba(244,180,0,.14);box-shadow:0 8px 20px rgba(0,0,0,.28)}
.btn-gold{background:linear-gradient(135deg,var(--gold-soft),var(--gold),var(--gold-deep));color:#16120a;box-shadow:0 8px 22px rgba(244,180,0,.28)}
.btn-outline{background:rgba(255,255,255,.09);color:#fff3d2;border:1px solid rgba(244,180,0,.14);box-shadow:var(--shadow-soft)}
.btn-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(34,197,94,.24)}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:2px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(239,68,68,.24)}
.btn-queue{background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));color:#fff;border:2px solid rgba(255,255,255,.10);box-shadow:0 10px 22px rgba(37,99,235,.22)}
.btn-delete{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:2px solid rgba(255,255,255,.10);box-shadow:0 10px 22px rgba(239,68,68,.22)}
.mini{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;white-space:nowrap;flex:0 0 auto}
.tiny-btn{width:auto;padding:6px 8px;border-radius:10px;font-size:11px;font-weight:800}
.mini-copy{background:linear-gradient(135deg,var(--queue-blue-1),var(--queue-blue-2));color:#fff;border:2px solid rgba(255,255,255,.10)}
.drag-handle{
  width:auto;padding:6px 10px;border-radius:10px;font-size:15px;line-height:1;font-weight:800;
  color:#eef4ff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);
  box-shadow:var(--shadow-soft);cursor:grab;user-select:none;touch-action:none;flex:0 0 auto
}
.action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.action-buttons button{padding:8px 7px;min-height:36px;border-radius:12px;font-size:12px;line-height:1.05}
.bar-wrap{
  position:relative;width:100%;height:30px;border-radius:999px;overflow:hidden;
  background:rgba(255,255,255,.08);margin-top:8px;display:flex;
  border:1px solid rgba(244,180,0,.14);
  box-shadow:inset 0 3px 8px rgba(255,255,255,.06),inset 0 -6px 14px rgba(0,0,0,.22),0 10px 22px rgba(0,0,0,.18)
}
.bar-wrap.tappable{cursor:pointer}
.bar-wrap.paused{border-color:rgba(245,158,11,.35)}
.bar-done{background:linear-gradient(90deg,#16a34a,#22c55e);height:100%;transition:width .5s ease}
.bar-left{background:linear-gradient(90deg,#ef4444,#ff8080);height:100%;transition:width .5s ease}
.bar-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.50);pointer-events:none
}
.task-meta{margin-top:5px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:800;color:#c9b78c}
.performance-wrap{margin-top:10px}
.performance-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.perf-box{
  border-radius:18px;padding:10px 8px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;
  border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-soft)
}
.perf-box h4{margin:0;font-size:11px;line-height:1.15;font-weight:800;color:#d7c6a0}
.perf-box .val{font-size:18px;font-weight:800;line-height:1.1;word-break:break-word}
.perf-reward{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.08))}
.perf-penalty{background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.08))}
.perf-wallet{background:linear-gradient(135deg,rgba(244,180,0,.18),rgba(244,180,0,.08))}
.focus-strip{margin-top:10px;padding:9px 10px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-soft)}
.focus-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:900;color:var(--gold-soft);margin-bottom:8px}
.focus-dots{display:grid;grid-template-columns:repeat(14,1fr);gap:5px}
.focus-dot{
  width:13px;height:13px;border-radius:50%;justify-self:center;background:#fff;border:1px solid rgba(255,255,255,.65);
  box-shadow:0 2px 6px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:900;color:#1f2937;line-height:1
}
.focus-dot.green{background:#22c55e;border-color:#86efac;color:#fff}
.focus-dot.red{background:#ef4444;border-color:#fecaca;color:#fff}
.focus-dot.current{outline:2px solid rgba(255,255,255,.75);outline-offset:2px;animation:dotBlink 1s infinite}
.focus-times{display:grid;grid-template-columns:repeat(14,1fr);gap:5px;margin-top:5px;font-size:7px;color:#bdb29c;text-align:center}
.must-start-box{margin-top:6px;padding:7px 9px;border-radius:16px;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.22);box-shadow:var(--shadow-soft)}
.must-start-head{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:900;color:#ffd0d0;margin-bottom:5px}
.must-start-bar{height:8px;border-radius:999px;overflow:hidden;background:linear-gradient(90deg,#ef4444,#ff8080);border:1px solid rgba(255,255,255,.12)}
.must-start-fill{height:100%;background:linear-gradient(90deg,#16a34a,#22c55e);transition:width .4s ease}
.paired-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-top:10px}
.paired-box{border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:10px;background:rgba(255,255,255,.06);box-shadow:var(--shadow-soft);min-width:0}
.list-title{font-size:17px;font-weight:800;margin:0 0 8px 0;color:#fff5d7}
.queued-panel{border:1px solid rgba(120,190,255,.34);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 14px 34px rgba(96,165,250,.12)}
.queued-panel .list-title{color:var(--queued-title)}
.queued-panel .section-dot{background:linear-gradient(135deg,#93c5fd,#3b82f6)}
.store-panel{border:1px solid rgba(255,220,108,.32);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 14px 34px rgba(244,180,0,.12)}
.store-panel .list-title{color:var(--store-title)}
.store-panel .section-dot{background:linear-gradient(135deg,#ffe08a,#f4b400)}
.draggable-item{
  border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:8px 9px;margin-top:7px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));box-shadow:0 6px 14px rgba(0,0,0,.14)
}
.draggable-item.active{background:linear-gradient(135deg,rgba(34,197,94,.20),rgba(34,197,94,.10));border-color:rgba(34,197,94,.28)}
.queue-row,.store-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;align-items:center;gap:8px}
.item-name{font-weight:800;line-height:1.22;font-size:13px;word-break:break-word;color:#fff8e9;min-width:0}
.item-date{color:#d8ccb3;font-weight:800}
.item-meta{font-size:11px;color:#c9b78c;margin-top:5px;font-weight:700;line-height:1.2}
.top-card.warning{animation:pulse-warning 1.4s infinite}
.top-card.danger{animation:pulse-danger 1s infinite}
.top-card.paused{border-color:rgba(245,158,11,.30)}
.empty-state{font-size:12px;font-weight:700;padding:8px 2px}
.instructions-card{background:linear-gradient(180deg,rgba(28,28,28,.92),rgba(18,18,18,.90));border:1px solid rgba(244,180,0,.18)}
.instructions-body{line-height:1.55;color:#f5e8c8;font-size:12px}
.instructions-body p{margin:0 0 10px}
.instructions-body b{color:#ffd76a}
.instruction-example{display:block;margin-top:5px;padding:7px 9px;border-radius:12px;background:rgba(255,255,255,.07);color:#fff7dc;border:1px solid rgba(244,180,0,.16);font-weight:800}
.splash{
  position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at top,rgba(244,180,0,.14),transparent 28%),linear-gradient(180deg,#080808,#111);
  color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px
}
.splash-logo{width:116px;height:116px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:22px}
.splash-target{position:relative;width:116px;height:116px;border-radius:50%}
.ring1,.ring2,.ring3,.bull{position:absolute;inset:0;margin:auto;border-radius:50%;border:4px solid var(--gold)}
.ring1{width:112px;height:112px}.ring2{width:74px;height:74px}.ring3{width:38px;height:38px}
.bull{width:14px;height:14px;border:none;background:var(--gold)}
.arrow-svg{position:absolute;inset:0;width:116px;height:116px;z-index:8;overflow:visible;pointer-events:none}
.arrow-line{stroke:#fff;stroke-width:6;stroke-linecap:round}
.arrow-head{fill:#fff}
.splash-title{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.splash-tagline{font-size:19px;font-weight:700;color:var(--gold-soft);margin-bottom:18px}
.splash-sub{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.03em}
@media(max-width:380px){
  .app{padding:10px}.title{font-size:23px}.sub{font-size:16px}.bar-wrap{height:28px}.bar-label{font-size:13px}
  .perf-box .val{font-size:16px}.mini,.drag-handle{font-size:10px;padding:5px 7px}
  .queue-row,.store-row{gap:6px}.focus-dot{width:12px;height:12px;font-size:6px}.focus-times{font-size:7px}
}
</style>
</head>
<body>
<div class="splash" id="splashScreen">
  <div class="splash-logo">
    <div class="splash-target">
      <div class="ring1"></div><div class="ring2"></div><div class="ring3"></div><div class="bull"></div>
      <svg class="arrow-svg" viewBox="0 0 116 116" aria-hidden="true">
        <g><line x1="104" y1="12" x2="58" y2="58" class="arrow-line"></line><polygon points="58,58 68,54 62,48" class="arrow-head"></polygon></g>
      </svg>
    </div>
  </div>
  <div class="splash-title">Kartavya</div>
  <div class="splash-tagline">Discipline is Wealth</div>
  <div class="splash-sub">KARTAVYA DISCIPLINE SYSTEM</div>
</div>

<div class="app" id="app"></div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.unregister()));
}

const STORAGE_KEY='kartavya-main-data';
const TOPUP=5000,DEFAULT_WALLET=5000,DEFAULT_REWARD=50,DEFAULT_PENALTY=200,DEFAULT_DURATION=30;
const STAR_HOUR_PENALTY=30,STAR_MINUTES_PER_HOUR_MS=30*60*1000,STAR_START_HOUR=8,STAR_END_HOUR=22;
const COMPULSORY_START_MS=10*60*1000,COMPULSORY_AFTER_DAYS=3;
const MACRODROID_WEBHOOK_URL='https://trigger.macrodroid.com/9d8de64f-05db-49f9-9470-18e7f06404e1/kartavya_timer';

const state={
  wallet:DEFAULT_WALLET,
  reward:String(DEFAULT_REWARD),
  penalty:String(DEFAULT_PENALTY),
  storeDurationText:'30 min',
  tasks:[],
  taskStore:[],
  history:[],
  activeTaskId:null,
  showStoreList:false,
  showInstructions:false,
  showDisclaimer:false,
  editStoreTaskId:null,
  editStoreTaskName:'',
  editStoreTaskDurationText:'30 min',
  starHourWorkMs:{},
  starHourPenaltyApplied:{},
  lastWorkSliceAt:null,
  soundEnabled:true,
  vibrationEnabled:true
};

function sanitizeNumber(value,fallback){const n=Number(value);return Number.isFinite(n)&&n>=0?n:fallback}
function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function rupee(n){return '₹'+Number(n||0).toLocaleString('en-IN')}
function todayKey(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function hourKey(d){return todayKey(d)+'-'+String(d.getHours()).padStart(2,'0')}
function suffixDay(d){if(d>3&&d<21)return d+'th';switch(d%10){case 1:return d+'st';case 2:return d+'nd';case 3:return d+'rd';default:return d+'th'}}
function createdDateShort(iso){if(!iso)return '';const d=new Date(iso);if(isNaN(d))return '';return suffixDay(d.getDate())+' '+d.toLocaleString('en-IN',{month:'long'})}
function formatDuration(mins){mins=Math.max(0,Math.round(Number(mins)||0));if(mins<60)return mins+' min';const h=Math.floor(mins/60),m=mins%60;return m===0?h+' hr':h+' hr '+m+' min'}
function formatMs(ms){let mins=Math.floor(Math.max(0,Number(ms)||0)/60000);if(mins<60)return mins+' min';const h=Math.floor(mins/60),m=mins%60;return m===0?h+' hr':h+' hr '+m+' min'}
function formatTimeLeftDisplay(seconds){seconds=Math.max(0,Math.floor(Number(seconds)||0));const mins=Math.floor(seconds/60);if(mins<60)return 'Time left '+mins+' min';const h=Math.floor(mins/60),m=mins%60;return 'Time left '+h+' hr '+m+' min'}
function parseDurationToMinutes(text){
  if(typeof text!=='string')return null;
  const raw=text.trim().toLowerCase();if(!raw)return null;
  let total=0,matched=false;
  const hr=raw.match(/(\d+(?:\.\d+)?)\s*(hr|hrs|hour|hours|h)\b/);
  const mn=raw.match(/(\d+)\s*(min|mins|minute|minutes|m)\b/);
  if(hr){total+=Math.round(parseFloat(hr[1])*60);matched=true}
  if(mn){total+=parseInt(mn[1],10);matched=true}
  if(matched&&total>0)return total;
  if(/^\d+$/.test(raw))return parseInt(raw,10);
  return null
}
function normalizeDurationInput(text){const mins=parseDurationToMinutes(text);if(mins===null||mins<=0)return null;return{minutes:mins,text:formatDuration(mins)}}
function isStarredTaskName(name){return /^\s*\*/.test(String(name||''))}
function activeTask(){return state.activeTaskId?state.tasks.find(x=>x.id===state.activeTaskId)||null:null}
function getStoreItem(id){return state.taskStore.find(x=>x.id===id)||null}
function cleanTaskName(name){let s=String(name||'').trim().toLowerCase();while(s.includes('  '))s=s.replaceAll('  ',' ');return s}

/* CLEAN TIME LOGIC: active time is never derived from leftover/deadline/10-min bar */
function currentActiveWorkedMs(task){
  if(!task)return 0;
  let total=Number(task.accumulatedMs)||0;
  if(!task.isPaused && task.sessionStartMs){
    total+=Math.max(0,Date.now()-Number(task.sessionStartMs));
  }
  return Math.max(0,total);
}
function currentPlannedMs(task){
  return Math.max(1,Number(task&&task.durationMinutes)||DEFAULT_DURATION)*60000;
}
function progressPercent(task){
  if(!task)return 0;
  return Math.max(0,Math.min(100,Math.round((currentActiveWorkedMs(task)/currentPlannedMs(task))*100)))
}
function updateActiveAccumulation(){
  const a=activeTask();
  if(!a||a.isPaused||!a.sessionStartMs)return false;
  const now=Date.now();
  const delta=Math.max(0,now-Number(a.sessionStartMs));
  if(delta<=0)return false;
  a.accumulatedMs=(Number(a.accumulatedMs)||0)+delta;
  a.sessionStartMs=now;
  return true;
}

function storedWorkedMs(item){return Math.max(0,Number(item&&item.totalWorkedMs)||0)}
function historyWorkedMsForStoreItem(item){
  if(!item)return 0;
  return state.history.reduce((sum,h)=>{
    if(!h||h.isStarHourPenalty)return sum;
    const sameSource=h.sourceType==='store'&&h.sourceId===item.id;
    const sameName=cleanTaskName(h.taskName)===cleanTaskName(item.taskName);
    if(!sameSource&&!sameName)return sum;
    return sum+Math.max(0,Number(h.workedMs)||0)
  },0)
}
function storeItemCumulativeWorkedMs(item){
  return Math.max(storedWorkedMs(item),historyWorkedMsForStoreItem(item))
}
function taskCumulativeWorkedMs(task){
  if(!task)return 0;
  const item=(task.sourceType==='store'&&task.sourceId)?getStoreItem(task.sourceId):null;
  const base=item?storeItemCumulativeWorkedMs(item):0;
  return base+currentActiveWorkedMs(task)
}

function taskCreatedMs(item){const t=new Date(item&&item.createdAt).getTime();return Number.isFinite(t)?t:Date.now()}
function isOldEnoughForCompulsory(item){return Date.now()-taskCreatedMs(item)>=COMPULSORY_AFTER_DAYS*24*60*60*1000}
function activeWorkMsForStoreItem(item){const a=activeTask();return(a&&item&&a.sourceType==='store'&&a.sourceId===item.id)?currentActiveWorkedMs(a):0}
function effectiveStoreWorkedMs(item){return storeItemCumulativeWorkedMs(item)+activeWorkMsForStoreItem(item)}
function isAttendedEnough(item){return effectiveStoreWorkedMs(item)>=COMPULSORY_START_MS}
function isCompulsoryStoreItem(item){return !!(item&&!isAttendedEnough(item)&&isOldEnoughForCompulsory(item))}
function oldestCompulsoryStoreItem(){return state.taskStore.filter(isCompulsoryStoreItem).sort((a,b)=>taskCreatedMs(a)-taskCreatedMs(b))[0]||null}
function compulsoryProgressMsForTask(task){
  if(!task||task.sourceType!=='store'||!task.sourceId)return 0;
  const item=getStoreItem(task.sourceId);
  const base=item?storeItemCumulativeWorkedMs(item):0;
  return Math.min(COMPULSORY_START_MS,base+currentActiveWorkedMs(task))
}
function isCompulsoryActiveTask(task){
  const old=oldestCompulsoryStoreItem();
  return !!(task&&old&&task.sourceType==='store'&&task.sourceId===old.id&&compulsoryProgressMsForTask(task)<COMPULSORY_START_MS)
}
function compulsoryProgressHtml(task){
  const done=compulsoryProgressMsForTask(task);
  if(!isCompulsoryActiveTask(task)||done>=COMPULSORY_START_MS)return '';
  const pct=Math.max(0,Math.min(100,Math.round((done/COMPULSORY_START_MS)*100)));
  return '<div class="must-start-box" id="mustStartBox"><div class="must-start-head"><span>Oldest task attendance</span><span id="mustStartText">'+formatMs(done)+' / 10 min</span></div><div class="must-start-bar"><div class="must-start-fill" id="mustStartFill" style="width:'+pct+'%"></div></div></div>'
}

function normalizeQueueOrdering(){
  const starred=[],normal=[];
  state.tasks.forEach(i=>(isStarredTaskName(i.taskName)?starred:normal).push(i));
  state.tasks=[...starred,...normal]
}
function normalizeTaskStoreOrdering(){
  const required=[],starred=[],open=[],done=[];
  state.taskStore.forEach(i=>{
    if(isCompulsoryStoreItem(i))required.push(i);
    else if(isStarredTaskName(i.taskName))starred.push(i);
    else if(i.completed)done.push(i);
    else open.push(i)
  });
  required.sort((a,b)=>taskCreatedMs(a)-taskCreatedMs(b));
  state.taskStore=[...required,...starred,...open,...done]
}
function insertIntoPriorityList(listKey,item){
  state[listKey].push(item);
  if(listKey==='tasks')normalizeQueueOrdering();
  if(listKey==='taskStore')normalizeTaskStoreOrdering()
}

function addStarWorkSlice(startMs,endMs){
  let changed=false,cursor=startMs;
  while(cursor<endMs){
    const d=new Date(cursor),hr=d.getHours(),next=new Date(d);
    next.setMinutes(0,0,0);next.setHours(hr+1);
    const sliceEnd=Math.min(endMs,next.getTime());
    if(hr>=STAR_START_HOUR&&hr<STAR_END_HOUR){
      const key=hourKey(d);
      state.starHourWorkMs[key]=(state.starHourWorkMs[key]||0)+(sliceEnd-cursor);
      changed=true
    }
    cursor=sliceEnd
  }
  return changed
}
function ensureStarHourPenalties(){
  let changed=false;const now=new Date(),dates=[new Date(now),new Date(now.getTime()-86400000)];
  dates.forEach(day=>{
    const y=day.getFullYear(),m=day.getMonth(),dt=day.getDate();
    for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){
      const slotEnd=new Date(y,m,dt,h+1,0,0,0),key=todayKey(new Date(y,m,dt))+'-'+String(h).padStart(2,'0');
      if(Date.now()>=slotEnd.getTime()&&!state.starHourPenaltyApplied[key]){
        const worked=state.starHourWorkMs[key]||0;
        if(worked<STAR_MINUTES_PER_HOUR_MS){
          state.wallet=Math.max(0,state.wallet-STAR_HOUR_PENALTY);
          state.history.unshift({id:Date.now()+Math.floor(Math.random()*1000),taskName:'★ Task shortfall '+key,reward:0,penalty:STAR_HOUR_PENALTY,result:'fail',completedAt:new Date().toISOString(),isStarHourPenalty:true,penaltyDate:key})
        }
        state.starHourPenaltyApplied[key]=true;changed=true
      }
    }
  });
  return changed
}
function accountStarredWorkAndPenalties(){
  const now=Date.now();
  if(!state.lastWorkSliceAt){state.lastWorkSliceAt=now;save();return}
  let changed=false;const a=activeTask();
  if(a&&(isStarredTaskName(a.taskName)||isCompulsoryActiveTask(a))&&!a.isPaused){
    changed=addStarWorkSlice(state.lastWorkSliceAt,now)||changed
  }
  state.lastWorkSliceAt=now;
  changed=ensureStarHourPenalties()||changed;
  if(changed)save()
}
function currentHourStarSatisfied(){const key=hourKey(new Date());return(state.starHourWorkMs[key]||0)>=STAR_MINUTES_PER_HOUR_MS}
function currentTaskTextClass(a){if(!a||!isStarredTaskName(a.taskName))return'';return currentHourStarSatisfied()?'star-current-green':'star-current-gold'}
function currentTaskHtml(a){

  const compulsory=isCompulsoryActiveTask(a);
  return'<span class="'+dot+'"></span><span class="'+currentTaskTextClass(a)+(compulsory?' oldest-required':'')+'">'+escapeHtml(a.taskName)+'</span>'+(compulsory?'<span class="required-check">✓</span>':'')
}
function focusDotsHtml(){
  const now=new Date(),currentHour=now.getHours();let greenCount=0,dots='',times='',totalMs=0;
  for(let h=STAR_START_HOUR;h<STAR_END_HOUR;h++){
    const d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,0,0,0);
    const key=hourKey(d),worked=state.starHourWorkMs[key]||0,slotEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h+1,0,0,0);
    totalMs+=worked;const mins=Math.min(59,Math.floor(worked/60000));
    let cls='focus-dot';

    else if(Date.now()>=slotEnd.getTime()){cls+=' red'}

    const label=(h<12?h+' AM':(h===12?'12 PM':(h-12)+' PM'))+'-'+((h+1)<12?(h+1)+' AM':((h+1)===12?'12 PM':(h+1-12)+' PM'));
    dots+='<span class="'+cls+'" onclick="alert(\''+label+': '+mins+' min\')" title="'+label+': '+mins+' min"></span>';
    times+='<span>'+h+'</span>'
  }
  return{greenCount,html:'<div class="focus-strip"><div class="focus-head"><span>*Main Task Today '+greenCount+'/14</span><span>8 AM-10 PM ('+formatMs(totalMs)+')</span></div><div class="focus-dots">'+dots+'</div><div class="focus-times">'+times+'</div></div>'}
}

function sendMacroDroidState(taskName,reminderEpoch,taskState,successMessage='',silent=false){
  if(!MACRODROID_WEBHOOK_URL)return Promise.resolve(false);
  const sep=MACRODROID_WEBHOOK_URL.includes('?')?'&':'?';
  const url=MACRODROID_WEBHOOK_URL+sep+'task_name='+encodeURIComponent(taskName||'')+'&reminder_epoch='+encodeURIComponent(Math.max(0,Math.round(Number(reminderEpoch)||0)))+'&task_state='+encodeURIComponent(taskState||'none');
  return fetch(url,{method:'GET',mode:'no-cors'}).then(()=>true).catch(()=>false)
}
function clearMacroDroidState(){return sendMacroDroidState('',0,'none','',true)}
function autoSendMacroDroidForActiveTask(){
  const a=activeTask();
  if(!a||!a.deadline||a.isPaused)return clearMacroDroidState();
  const reminderEpoch=Math.max(0,new Date(a.deadline).getTime()-1*60*1000);
  const remainingMs=Math.max(0,new Date(a.deadline).getTime()-Date.now());
  if(remainingMs<=1*60*1000)return clearMacroDroidState();
  if(a.macroReminderEpochSent===reminderEpoch&&a.macroStateSentForTaskId===a.id)return;
  sendMacroDroidState(a.taskName,reminderEpoch,'active','',true).then(ok=>{
    if(ok){a.macroStateSentForTaskId=a.id;a.macroReminderEpochSent=reminderEpoch;save()}
  })
}

function load(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){try{Object.assign(state,JSON.parse(raw))}catch(e){}}
  state.wallet=sanitizeNumber(state.wallet,DEFAULT_WALLET);
  state.reward=String(sanitizeNumber(state.reward,DEFAULT_REWARD));
  state.penalty=String(sanitizeNumber(state.penalty,DEFAULT_PENALTY));
  if(!Array.isArray(state.tasks))state.tasks=[];
  if(!Array.isArray(state.taskStore))state.taskStore=[];
  if(!Array.isArray(state.history))state.history=[];
  if(typeof state.showStoreList!=='boolean')state.showStoreList=false;
  if(typeof state.showInstructions!=='boolean')state.showInstructions=false;
  if(typeof state.showDisclaimer!=='boolean')state.showDisclaimer=false;
  if(typeof state.editStoreTaskId==='undefined')state.editStoreTaskId=null;
  if(typeof state.editStoreTaskName!=='string')state.editStoreTaskName='';
  if(typeof state.editStoreTaskDurationText!=='string')state.editStoreTaskDurationText='30 min';
  if(typeof state.starHourWorkMs!=='object'||!state.starHourWorkMs)state.starHourWorkMs={};
  if(typeof state.starHourPenaltyApplied!=='object'||!state.starHourPenaltyApplied)state.starHourPenaltyApplied={};
  if(typeof state.lastWorkSliceAt!=='number')state.lastWorkSliceAt=Date.now();
  const storeNormalized=normalizeDurationInput(state.storeDurationText||'30 min');
  state.storeDurationText=storeNormalized?storeNormalized.text:'30 min';
  migrateTasks();migrateTaskStore();normalizeQueueOrdering();normalizeTaskStoreOrdering();syncActive()
}
function activateTask(task){
  if(!task)return;
  if(task.activatedAt&&task.deadline)return;
  const now=Date.now(),durationMinutes=Math.max(1,sanitizeNumber(task.durationMinutes,DEFAULT_DURATION));
  task.durationMinutes=durationMinutes;task.durationText=formatDuration(durationMinutes);
  task.activatedAt=new Date(now).toISOString();
  task.deadline=new Date(now+durationMinutes*60000).toISOString();
  task.isPaused=false;task.accumulatedMs=0;task.sessionStartMs=now;
  task.macroStateSentForTaskId=null;task.macroReminderEpochSent=null
}
function migrateTasks(){
  state.tasks=state.tasks.map((task,index)=>{
    if(typeof task.taskName!=='string')task.taskName='Task';
    task.reward=sanitizeNumber(task.reward,DEFAULT_REWARD);
    task.penalty=sanitizeNumber(task.penalty,DEFAULT_PENALTY);
    task.durationMinutes=Math.max(1,sanitizeNumber(task.durationMinutes,DEFAULT_DURATION));
    task.durationText=formatDuration(task.durationMinutes);
    if(!task.createdAt)task.createdAt=new Date().toISOString();
    if(typeof task.isPaused!=='boolean')task.isPaused=false;
    if(typeof task.accumulatedMs!=='number')task.accumulatedMs=Number(task.sessionWorkedMs)||0;
    if(typeof task.sessionStartMs!=='number'&&!task.isPaused&&task.activatedAt)task.sessionStartMs=Date.now();
    if(index!==0&&!task.activatedAt){delete task.deadline;delete task.activatedAt}
    return task
  })
}
function migrateTaskStore(){
  state.taskStore=state.taskStore.map((item,idx)=>({
    id:item&&item.id?item.id:Date.now()+idx,
    taskName:item&&typeof item.taskName==='string'&&item.taskName.trim()?item.taskName.trim():'Stored Task',
    durationMinutes:Math.max(1,sanitizeNumber(item&&item.durationMinutes,DEFAULT_DURATION)),
    completed:!!(item&&item.completed),
    autoServed:!!(item&&item.autoServed),
    createdAt:item&&item.createdAt?item.createdAt:new Date().toISOString(),
    totalWorkedMs:Math.max(0,Number(item&&item.totalWorkedMs)||0)
  }))
}
function syncActive(){
  if(!state.tasks.length){state.activeTaskId=null;save();return}
  const exists=state.tasks.some(x=>x.id===state.activeTaskId);
  if(!exists)state.activeTaskId=state.tasks[0].id;
  activateTask(activeTask());save()
}
function secondsLeft(d){return Math.max(0,Math.floor((new Date(d)-new Date())/1000))}

function currentRemainingText(a){

function alarm(type='normal'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=type==='danger'?220:660;gain.gain.value=.04;osc.start();osc.stop(ctx.currentTime+.22)
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate(type==='danger'?[250,120,250]:[120,60,120])
}

  }

function addWorkedTimeToStore(task,workedMs){

function markSourceTaskCompleted(task){
  if(!task||task.sourceType!=='store'||!task.sourceId)return;
  state.taskStore=state.taskStore.map(item=>{
    if(item.id!==task.sourceId)return item;
    const totalNow=storeItemCumulativeWorkedMs(item);
    const stillCompulsory=isOldEnoughForCompulsory(item)&&totalNow<COMPULSORY_START_MS;
    return{...item,completed:!stillCompulsory,autoServed:false}
  });

function finishTask(result){
  const a=activeTask();if(!a)return;

  const workedMs=currentActiveWorkedMs(a);
  addWorkedTimeToStore(a,workedMs);
  if(result==='success'){state.wallet+=sanitizeNumber(a.reward,DEFAULT_REWARD);markSourceTaskCompleted(a);alarm('normal')}
  else{state.wallet=Math.max(0,state.wallet-sanitizeNumber(a.penalty,DEFAULT_PENALTY));alarm('danger')}
  state.history.unshift({...a,result,completedAt:new Date().toISOString(),workedMs});
  state.tasks=state.tasks.filter(x=>x.id!==a.id);
  state.activeTaskId=null;syncActive();save();render();
  if(activeTask())autoSendMacroDroidForActiveTask();else clearMacroDroidState()
}

function currentRemainingText(a){
  if(!a)return'Time left 0 min';
  if(a.isPaused)return'Paused • Tap to Resume';
  return formatTimeLeftDisplay(Math.max(0,(new Date(a.deadline)-new Date())/1000))+' • Tap to Pause'
}
function refreshLive(){
  const a=activeTask(),current=document.getElementById('currentTaskText'),clockInline=document.getElementById('timeLeftInline'),doneBar=document.getElementById('doneBar'),leftBar=document.getElementById('leftBar'),percent=document.getElementById('successPercent'),topCard=document.getElementById('topCard'),activeDuration=document.getElementById('activeDurationText'),activeTotal=document.getElementById('activeTotalHrsText'),deadlineStatus=document.getElementById('deadlineStatusText'),taskBar=document.getElementById('taskBarTap'),focus=document.getElementById('focusDotsWrap');
  if(percent)percent.textContent=successPercent()+'% Success';
  if(focus)focus.innerHTML=focusDotsHtml().html;
  if(a){
    const overdue=!a.isPaused&&a.deadline&&(new Date(a.deadline)-new Date())<=0;
    if(topCard)topCard.className='card top-card '+(a.isPaused?'paused':(overdue?'danger':urgencyClass()));
    if(current)current.innerHTML=currentTaskHtml(a);
    if(clockInline)clockInline.textContent=a.isPaused?'Paused • Tap to Resume':(overdue?'Overdue • Tap to Pause':currentRemainingText(a));
    if(activeDuration)activeDuration.textContent=formatDuration(a.durationMinutes||0);
    if(activeTotal)activeTotal.textContent=formatMs(taskCumulativeWorkedMs(a));
    const mustStartBox=document.getElementById('mustStartBox');
    if(mustStartBox){
      const done=compulsoryProgressMsForTask(a);
      const pct=Math.max(0,Math.min(100,Math.round((done/COMPULSORY_START_MS)*100)));
      const mustStartText=document.getElementById('mustStartText'),mustStartFill=document.getElementById('mustStartFill');
      if(mustStartText)mustStartText.textContent=formatMs(done)+' / 10 min';
      if(mustStartFill)mustStartFill.style.width=pct+'%';
      if(done>=COMPULSORY_START_MS||!isCompulsoryActiveTask(a)){mustStartBox.remove();normalizeTaskStoreOrdering();save()}
    }
    if(deadlineStatus)deadlineStatus.textContent=a.isPaused?'Paused':(overdue?'Deadline crossed':'Ends: '+new Date(a.deadline).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    const pct=progressPercent(a);
    if(doneBar)doneBar.style.width=pct+'%';
    if(leftBar)leftBar.style.width=(100-pct)+'%';
    if(taskBar)taskBar.className='bar-wrap tappable'+(a.isPaused?' paused':'')
  }else{
    if(topCard)topCard.className='card top-card safe';
    if(current)current.textContent='No active task';
    if(clockInline)clockInline.textContent='Time left 0 min';
    if(activeDuration)activeDuration.textContent='--';
    if(activeTotal)activeTotal.textContent='--';
    if(deadlineStatus)deadlineStatus.textContent='';
    if(doneBar)doneBar.style.width='0%';
    if(leftBar)leftBar.style.width='100%';
    if(taskBar)taskBar.className='bar-wrap'
  }
}
function bindDragAndDrop(){}
function render(){
  normalizeTaskStoreOrdering();
  const app=document.getElementById('app'),a=activeTask(),s=stats(),urgency=urgencyClass();
  const overdue=!!(a&&!a.isPaused&&a.deadline&&(new Date(a.deadline)-new Date())<=0);
  const endText=a?(a.isPaused?'Paused':(overdue?'Deadline crossed':'Ends: '+new Date(a.deadline).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}))):'';
  const successButtonText='✔️ Success (Get '+rupee(Number(state.reward||DEFAULT_REWARD))+')';
  const failButtonText='❌ Failed (Pay '+rupee(Number(state.penalty||DEFAULT_PENALTY))+')';
  const timeLeftText=a?(a.isPaused?'Paused • Tap to Resume':(overdue?'Overdue • Tap to Pause':currentRemainingText(a))):'Time left 0 min';
  const focus=focusDotsHtml();

  const queueHtml=state.tasks.length?state.tasks.map((item,idx)=>{
    const isActive=item.id===state.activeTaskId,isStar=isStarredTaskName(item.taskName),label=isActive?'▶ ':(isStar?'':(idx+1)+'. '),date=createdDateShort(item.createdAt);
    return '<div class="draggable-item'+(isActive?' active':'')+'" data-list="queue" data-id="'+item.id+'"><div class="queue-row"><div><div class="item-name '+(isStar?'star-item-name':'')+'">'+label+escapeHtml(item.taskName)+(date?' <span class="item-date">('+escapeHtml(date)+')</span>':'')+'</div><div class="item-meta">'+formatDuration(item.durationMinutes||0)+' • Total Hrs '+formatMs(taskCumulativeWorkedMs(item))+'</div></div><button class="mini mini-copy" data-copy-queue="'+item.id+'">Copy</button><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="queue" data-id="'+item.id+'">⋮⋮</button><button class="btn-delete mini" data-remove="'+item.id+'">Delete</button></div></div>'
  }).join(''):'<div class="empty-state">No queued task yet.</div>';

  const storeHtml=state.taskStore.length?state.taskStore.map((item,idx)=>{
    const dotClass=item.completed?'green':'red',isStar=isStarredTaskName(item.taskName),isRequired=isCompulsoryStoreItem(item),label=isStar?'':(idx+1)+'. ',date=createdDateShort(item.createdAt);
    if(state.editStoreTaskId===item.id){
      return '<div class="draggable-item" data-list="store" data-id="'+item.id+'"><div class="paired-grid" style="margin-top:0"><div class="paired-box"><label>Task Name</label><input id="editStoreTaskName_'+item.id+'" value="'+escapeHtml(state.editStoreTaskName||item.taskName)+'"></div><div class="paired-box"><label>Duration</label><input id="editStoreTaskDuration_'+item.id+'" class="duration-input" value="'+escapeHtml(state.editStoreTaskDurationText||formatDuration(item.durationMinutes))+'"></div></div><div class="row" style="margin-top:8px"><button class="btn-success mini" style="flex:1" data-save-store-edit="'+item.id+'">Save</button><button class="btn-outline mini" data-cancel-store-edit="1">Cancel</button></div></div>'
    }
    return '<div class="draggable-item" data-list="store" data-id="'+item.id+'"><div class="store-row"><div><div class="item-name '+(isStar?'star-item-name ':'')+'" data-edit-store="'+item.id+'" style="cursor:pointer"><span class="status-dot '+dotClass+'"></span>'+label+'<span class="'+(isRequired?'oldest-required':'')+'">'+escapeHtml(item.taskName)+'</span>'+(date?' <span class="item-date">('+escapeHtml(date)+')</span>':'')+(isRequired?' <span class="required-check">✓</span>':'')+'</div><div class="item-meta">'+formatDuration(item.durationMinutes)+' • Total Hrs '+formatMs(storeItemCumulativeWorkedMs(item))+'</div></div><button class="drag-handle" draggable="true" data-drag-handle="1" data-list="store" data-id="'+item.id+'">⋮⋮</button><button class="btn-queue mini" data-send-queue="'+item.id+'">Queue</button><button class="btn-delete mini" data-store-delete="'+item.id+'">Delete</button></div></div>'
  }).join(''):'<div class="empty-state">No task stored yet.</div>';

  app.innerHTML=`
<div class="card top-card ${a&&a.isPaused?'paused':(overdue?'danger':urgency)}" id="topCard">
  <div class="space">
    <div class="row" style="min-width:0;flex:1">
      <div class="title">Kartavya</div><div class="logo-wrap"><div class="logo">🎯</div></div>
      <div id="successPercent" class="small pill green-pill">${successPercent()}% Success</div>
    </div>
    <div style="min-width:0;flex:1;text-align:right">
      <div class="small">Current Task</div>
      <div class="sub" id="currentTaskText" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentTaskHtml(a)}</div>
      <div class="star-rule">★Task: 30 min/hr or lose ₹30</div>
    </div>
  </div>
  <div class="bar-wrap ${a?'tappable':''} ${a&&a.isPaused?'paused':''}" id="taskBarTap">
    <div class="bar-done" id="doneBar" style="width:${a?progressPercent(a):0}%"></div>
    <div class="bar-left" id="leftBar" style="width:${a?100-progressPercent(a):100}%"></div>
    <div class="bar-label" id="timeLeftInline">${timeLeftText}</div>
  </div>
  <div class="task-meta">
    <div>Duration: <span id="activeDurationText">${a?formatDuration(a.durationMinutes||0):'--'}</span></div>
    <div>Total Hrs: <span id="activeTotalHrsText">${a?formatMs(taskCumulativeWorkedMs(a)):'--'}</span></div>
    <div id="deadlineStatusText">${endText}</div>
  </div>
  ${compulsoryProgressHtml(a)}
  <div class="action-buttons">
    <button class="btn-success" id="successBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${successButtonText}</button>
    <button class="btn-danger" id="failBtn" ${a?'':'disabled style="opacity:.45;pointer-events:none"'}>${failButtonText}</button>
  </div>
</div>

<div class="card">
  <div class="section-head"><span class="section-dot"></span><div class="sub">Your Performance</div></div>
  <div class="performance-wrap">
    <div class="performance-grid">
      <div class="perf-box perf-reward"><h4>Total Reward</h4><div class="val" style="color:#d8ffe6">${rupee(s.reward)}</div></div>
      <div class="perf-box perf-penalty"><h4>Total Penalty</h4><div class="val" style="color:#ffd0d0">${rupee(s.penalty)}</div></div>
      <div class="perf-box perf-wallet"><h4>Wallet Balance</h4><div class="val">${rupee(state.wallet)}</div><button class="btn-primary tiny-btn" id="topupBtn">+${rupee(TOPUP)}</button></div>
    </div>
    <div id="focusDotsWrap">${focus.html}</div>
  </div>
</div>

<div class="card queued-panel">
  <div class="section-head"><span class="section-dot"></span><div class="list-title">Queued Task</div></div>
  ${queueHtml}
</div>

<div class="card store-panel">
  <div class="section-head"><span class="section-dot"></span><div class="list-title">Task Store</div></div>
  <div class="paired-grid">
    <div class="paired-box"><label>Task</label><input id="storeTaskInput" value="" placeholder="Enter Task"></div>
    <div class="paired-box"><label>Duration</label><input id="storeDurationInput" class="duration-input" value="${escapeHtml(state.storeDurationText)}" placeholder="e.g. 30 min"></div>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="btn-gold" id="storeAddBtn" style="flex:1">Add Task</button>
    <button class="btn-outline mini" id="toggleStoreBtn">${state.showStoreList?'Hide Stored Tasks':'Show Stored Tasks'}</button>
  </div>
  <div id="storeListWrap" style="margin-top:8px;display:${state.showStoreList?'block':'none'}">${storeHtml}</div>
</div>

<div class="card">
  <div class="section-head"><span class="section-dot"></span><div class="sub">Controls</div></div>
  <div class="row" style="margin-top:10px">
    <button class="btn-outline mini" id="resetScoreBtn">Reset Score</button>
    <button class="btn-outline mini" id="instructionsBtn">${state.showInstructions?'Hide Instructions':'How to Use This App'}</button>
    <button class="btn-outline mini" id="disclaimerBtn">${state.showDisclaimer?'Hide Disclaimer':'Disclaimer'}</button>
  </div>
</div>
${instructionsHtml()}${disclaimerHtml()}`;

  bindStoreDurationInput();
  document.getElementById('topupBtn').addEventListener('click',addTopup);
  document.getElementById('storeAddBtn').addEventListener('click',addTaskForFuture);
  document.getElementById('toggleStoreBtn').addEventListener('click',()=>{state.showStoreList=!state.showStoreList;save();render()});
  const taskBarTap=document.getElementById('taskBarTap');if(taskBarTap&&a)taskBarTap.addEventListener('click',togglePauseResume);
  const storeInput=document.getElementById('storeTaskInput');if(storeInput)storeInput.addEventListener('keydown',e=>{if(e.key==='Enter')addTaskForFuture()});
  document.getElementById('resetScoreBtn').addEventListener('click',resetScore);
  document.getElementById('instructionsBtn').addEventListener('click',toggleInstructions);
  document.getElementById('disclaimerBtn').addEventListener('click',toggleDisclaimer);
  const successBtn=document.getElementById('successBtn');if(successBtn)successBtn.addEventListener('click',()=>finishTask('success'));
  const failBtn=document.getElementById('failBtn');if(failBtn)failBtn.addEventListener('click',()=>finishTask('fail'));
  document.querySelectorAll('[data-remove]').forEach(btn=>btn.addEventListener('click',()=>removeTask(Number(btn.getAttribute('data-remove')))));
  document.querySelectorAll('[data-copy-queue]').forEach(btn=>btn.addEventListener('click',()=>copyQueuedTask(Number(btn.getAttribute('data-copy-queue')))));
  document.querySelectorAll('[data-send-queue]').forEach(btn=>btn.addEventListener('click',()=>sendStoreTaskToQueue(Number(btn.getAttribute('data-send-queue')))));
  document.querySelectorAll('[data-edit-store]').forEach(el=>el.addEventListener('click',()=>startEditStoreTask(Number(el.getAttribute('data-edit-store')))));
  document.querySelectorAll('[data-save-store-edit]').forEach(btn=>btn.addEventListener('click',()=>saveEditStoreTask(Number(btn.getAttribute('data-save-store-edit')))));
  document.querySelectorAll('[data-cancel-store-edit]').forEach(btn=>btn.addEventListener('click',cancelEditStoreTask));
  document.querySelectorAll('[data-store-delete]').forEach(btn=>btn.addEventListener('click',()=>deleteStoreTask(Number(btn.getAttribute('data-store-delete')))))
}

load();
window.addEventListener('load',()=>{
  const splash=document.getElementById('splashScreen'),app=document.getElementById('app');
  setTimeout(()=>{
    if(splash)splash.style.display='none';
    if(app)app.style.display='block';
    render();
    if(activeTask())autoSendMacroDroidForActiveTask();else clearMacroDroidState()
  },1000)
});
setInterval(()=>{
  updateActiveAccumulation();
  accountStarredWorkAndPenalties();
  refreshLive();
  save()
},1000);
</script>
</body>
</html>
